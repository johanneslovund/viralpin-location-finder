<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ViralPin" />
  <meta name="theme-color" content="#080d1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>ViralPin - Location Finder</title>
  <meta name="description" content="Explore the most photographed spots in Norway — an interactive heatmap of photo locations powered by Flickr." />
  <script>const CONFIG={FLICKR_API_KEY:"07ca70504930cb812e9a2247e408525c"};</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    :root {
      --bg: #080d1a; --panel: rgba(6,11,28,0.86);
      --border: #182040; --accent: #3a5ae8; --text: #c8ccdf;
      --muted: #3a4268; --pill-active-bg: #1a2e7a; --pill-active-border: #3354c4;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── Map fills full viewport ── */
    .main { position: fixed; inset: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; z-index: 1; background: var(--bg); }

    /* ── Floating title ── */
    #map-title {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800; pointer-events: none;
      font-size: 0.95rem; font-weight: 700; color: #dde2f5;
      white-space: nowrap; letter-spacing: -0.01em;
      text-shadow: 0 1px 10px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.6);
    }
    #map-title span { color: #4d7fff; }
    .leaflet-tile-pane { filter: saturate(0.65) brightness(0.97) hue-rotate(170deg); }

    /* ── Bottom container: two stacked floating panels ── */
    #bottom-container {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: min(540px, calc(100vw - 16px));
      contain: layout style;
      will-change: transform;
    }

    /* ── Floating heatmap button ── */
    #heatmap-toggle-wrap {
      position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px;
      width: 100%;
    }
    #heat-btn {
      background: var(--panel); border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
      min-height: 34px; -webkit-user-select: none; user-select: none;
    }
    #heat-btn.active {
      background: linear-gradient(135deg, #2a4ee8, #1a8fff);
      border-color: #6b9fff; color: #fff; font-weight: 700;
      box-shadow: 0 0 22px rgba(80,160,255,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
      text-shadow: 0 1px 6px rgba(0,80,255,0.4);
    }
    #heat-btn:active { opacity: 0.75; }

    /* Main panel: slider + tags */
    #map-bottom {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; width: 100%;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    }

    /* Popularity slider */
    #pop-section {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px 6px; border-bottom: 1px solid #101830;
    }
    .pop-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
    #engagement-slider {
      flex: 1; appearance: none; -webkit-appearance: none;
      height: 2px; background: #1a2550; border-radius: 2px; outline: none; cursor: pointer;
      transform: scaleX(-1); touch-action: none;
    }
    #engagement-slider::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff;
      cursor: grab; box-shadow: 0 0 10px rgba(58,90,232,0.4);
    }
    #engagement-slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff; cursor: grab;
    }
    #slider-value { font-size: 0.67rem; color: #6878b0; font-weight: 600; white-space: nowrap; min-width: 56px; text-align: right; }
    .slider-adj {
      background: none; border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 6px; width: 26px; height: 26px; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0; line-height: 1; font-weight: 400;
      transition: background 0.1s, color 0.1s;
    }
    .slider-adj:active { background: #1a2e7a; color: #c0d0ff; border-color: #3354c4; }

    /* Search panel */
    #search-panel { display: none; padding: 9px 14px 7px; border-bottom: 1px solid #101830; flex-direction: column; gap: 6px; }
    #search-panel.open { display: flex; }
    .sp-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    #search-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .tag-query-row { display: flex; align-items: center; gap: 6px; }
    .tag-query {
      flex: 1; background: #0d1428; border: 1px solid #1a2448; color: #c0d0ff;
      border-radius: 8px; padding: 7px 10px; font-size: 0.8rem; outline: none;
      -webkit-appearance: none; min-height: 36px;
    }
    .tag-query::placeholder { color: #2a3460; }
    .tag-query:focus { border-color: #2a4aaf; }
    .rm-tag-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .sp-footer { display: flex; gap: 8px; margin-top: 2px; }
    #add-tag-btn { background: none; border: 1px solid #1a2448; color: #4a5888; border-radius: 8px; padding: 6px 12px; font-size: 0.72rem; cursor: pointer; min-height: 34px; }
    #do-search-btn { background: #1a2e7a; border: 1px solid #2a4aaf; color: #a8bfff; border-radius: 8px; padding: 6px 16px; font-size: 0.72rem; cursor: pointer; font-weight: 600; margin-left: auto; min-height: 34px; }

    /* Tag row: scrollable pills + pinned Search */
    #tag-row {
      display: flex; align-items: stretch; min-height: 48px; overflow: hidden;
    }
    #tag-bar-wrap {
      flex: 1 1 0; min-width: 0; position: relative; overflow: hidden;
    }
    /* Fade-out mask towards the right edge to hint scrollability */
    #tag-bar-wrap::after {
      content: ""; pointer-events: none;
      position: absolute; top: 0; right: 0; bottom: 0; width: 36px;
      background: linear-gradient(to right, transparent, rgba(6,11,28,0.92));
      z-index: 2;
    }
    #tag-bar {
      display: flex; gap: 7px; align-items: center; flex-wrap: nowrap;
      padding: 7px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; width: 100%; height: 100%;
    }
    #tag-bar::-webkit-scrollbar { display: none; }
    .tag-pill {
      background: transparent; border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 13px; font-size: 0.76rem; cursor: pointer;
      font-weight: 500; white-space: nowrap; flex-shrink: 0;
      min-height: 34px; transition: background 0.12s, color 0.12s, border-color 0.12s;
      -webkit-user-select: none; user-select: none;
    }
    .tag-pill:active { opacity: 0.7; }
    .tag-pill.active { background: var(--pill-active-bg); border-color: var(--pill-active-border); color: #c0d0ff; font-weight: 600; }

    /* Search pill — always visible, pinned LEFT, never shrinks */
    #search-pill-wrap {
      flex: 0 0 auto; display: flex; align-items: center;
      padding: 7px 8px 7px 10px;
      border-right: 1px solid #182040;
    }
    #search-pill {
      display: flex; align-items: center; gap: 5px;
      border: 1px solid #1e2d50; border-radius: 20px; padding: 6px 12px;
      cursor: pointer; white-space: nowrap; min-height: 34px;
      -webkit-user-select: none; user-select: none;
    }
    #search-pill:active { opacity: 0.7; }
    #search-pill.active { border-color: var(--pill-active-border); background: #111e38; }
    .search-icon { font-size: 0.76rem; color: #5868a0; }
    .search-label { font-size: 0.76rem; color: #5868a0; font-weight: 500; }

    /* ── Nav panel ── */
    #nav-panel {
      display: none; position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%); z-index: 900;
      background: var(--panel); border: 1px solid #1a3080;
      border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 10px 14px; align-items: center; gap: 10px;
      min-width: 280px; max-width: calc(100vw - 24px);
    }
    #nav-panel.active { display: flex; }
    #nav-info { flex: 1; min-width: 0; }
    #nav-dest-name { font-size: 0.8rem; font-weight: 600; color: #c0d0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #nav-details { font-size: 0.7rem; color: #5a78c0; margin-top: 2px; }
    #nav-stop { background: none; border: 1px solid #2a3a6a; color: #8898c0; border-radius: 6px; padding: 5px 10px; font-size: 0.76rem; cursor: pointer; flex-shrink: 0; min-height: 32px; }

    /* ── Cluster markers ── */
    .cm { position: relative; cursor: pointer; }
    .cm .thumb {
      display: block; border-radius: 10px; object-fit: cover;
      border: 2.5px solid rgba(255,255,255,0.85);
      box-shadow: 0 3px 14px rgba(0,0,0,0.75);
    }
    .cm::after {
      content: ""; position: absolute; bottom: -9px; left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-top: 10px solid rgba(255,255,255,0.85);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.55));
    }
    .cm .badge {
      position: absolute; bottom: 5px; left: 5px;
      background: rgba(0,0,0,0.75); color: #fff;
      font-size: 0.62rem; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; line-height: 1.6; pointer-events: none;
    }
    .cm.single .thumb { border-radius: 50%; }

    /* ── Location labels ── */
    .loc-icon { overflow: visible !important; }
    .loc-label {
      display: inline-block; white-space: nowrap; pointer-events: none;
      transform: translate(-50%, -100%); margin-top: -10px;
      background: rgba(20,36,120,0.88); border: 1px solid #4d6fe8;
      color: #d8e4ff; font-size: 0.72rem; font-weight: 700;
      padding: 4px 10px 4px 8px; border-radius: 7px;
      box-shadow: 0 2px 14px rgba(58,90,232,0.35);
      letter-spacing: 0.02em;
      opacity: 0;
      animation: locFadeIn 0.45s ease forwards;
    }
    .loc-label.fading { opacity: 0 !important; transition: opacity 0.3s ease; }
    @keyframes locFadeIn { from { opacity:0; transform:translate(-50%,-120%); } to { opacity:1; transform:translate(-50%,-100%); } }
    .loc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7aadff; display: inline-block;
      margin-right: 5px; vertical-align: middle;
    }

    /* ── User location dot ── */
    .user-dot { position: relative; width: 18px; height: 18px; }
    .user-dot .dot {
      width: 13px; height: 13px; background: #4d9fff; border: 2.5px solid #fff; border-radius: 50%;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      box-shadow: 0 0 8px #4d9fff88; z-index: 2;
    }
    .user-dot .ring {
      width: 34px; height: 34px; background: #4d9fff28; border-radius: 50%;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: pulse 2.2s ease-out infinite; z-index: 1;
    }
    @keyframes pulse {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(2.0); opacity: 0; }
    }

    /* ── Lightbox weather ── */
    #lb-weather { margin: 6px 0 2px; text-align: left; }
    #lb-sun {
      display: flex; gap: 16px; justify-content: center;
      font-size: 0.75rem; color: #8898c8; margin-bottom: 8px;
    }
    #lb-sun span { display: flex; align-items: center; gap: 4px; }
    #lb-hourly-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; margin-bottom: 6px;
    }
    #lb-hourly-wrap::-webkit-scrollbar { display: none; }
    #lb-hourly {
      display: flex; gap: 4px; min-width: max-content; padding: 2px 0;
    }
    .lb-h-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 46px; padding: 5px 4px; border-radius: 10px;
      background: rgba(20,30,70,0.5); border: 1px solid #1a2448;
    }
    .lb-h-time { font-size: 0.58rem; color: #4a5888; }
    .lb-h-icon { font-size: 1.05rem; line-height: 1; }
    .lb-h-temp { font-size: 0.72rem; font-weight: 600; color: #b8ccff; }
    #lb-weekly { display: none; flex-direction: column; gap: 3px; margin-bottom: 4px; }
    #lb-weekly.open { display: flex; }
    .lb-d-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; border-radius: 8px; background: rgba(20,30,70,0.4);
    }
    .lb-d-day { font-size: 0.68rem; color: #5a6898; min-width: 30px; }
    .lb-d-icon { font-size: 0.95rem; }
    .lb-d-range { font-size: 0.68rem; color: #8898c0; margin-left: auto; }
    #lb-forecast-toggle {
      background: none; border: 1px solid #1e2a50; color: #4a5888;
      border-radius: 8px; padding: 4px 10px; font-size: 0.65rem;
      cursor: pointer; font-family: inherit; margin-top: 2px;
    }
    #lb-forecast-toggle:active { opacity: 0.7; }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 9999; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; padding: 20px;
      -webkit-overflow-scrolling: touch;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 60vh; border-radius: 10px; object-fit: contain; flex-shrink: 0; }
    #lightbox-info { text-align: center; max-width: 500px; width: 100%; }
    #lightbox-title { font-size: 0.9rem; margin-bottom: 10px; color: #e8eaf0; }
    .lb-links { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .lb-links a, .lb-links button {
      color: #7c9fff; font-size: 0.76rem; text-decoration: none;
      border: 1px solid #1a2e7a; border-radius: 6px; padding: 7px 12px;
      background: rgba(10,20,60,0.6); cursor: pointer; font-family: inherit;
      min-height: 36px; display: flex; align-items: center;
    }
    .lb-links a:active, .lb-links button:active { opacity: 0.7; }
    #nav-details { font-size: 0.7rem; color: #5a78c0; margin-top: 4px; line-height: 1.5; }
    #lightbox-close {
      position: absolute; top: 14px; right: 16px; font-size: 2rem;
      background: none; border: none; color: #888; cursor: pointer; padding: 4px; min-width: 40px; min-height: 40px;
    }

    #status {
      position: absolute; bottom: 6px; right: 10px; z-index: 700;
      font-size: 0.64rem; color: #2a3460; pointer-events: none;
    }

    /* Leaflet overrides */
    .leaflet-control-attribution { background: rgba(8,13,26,0.7) !important; color: #2a3460 !important; font-size: 0.6rem !important; }
    .leaflet-control-attribution a { color: #3a4880 !important; }
    .leaflet-bar a { background: transparent !important; color: #6878a8 !important; border-color: transparent !important; min-width: 36px !important; min-height: 36px !important; line-height: 36px !important; font-size: 1rem !important; }
    .leaflet-bar { background: transparent !important; border: none !important; box-shadow: none !important; }
    .leaflet-bar a:active { opacity: 0.7; }
    .leaflet-tooltip { background: rgba(8,13,26,0.9); border: 1px solid #1a2540; color: #a8b8e0; font-size: 0.72rem; border-radius: 6px; }

    .loader { display: inline-block; width: 10px; height: 10px; border: 2px solid #2a4aaf; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive tweaks */
    @media (max-width: 560px) {
      #bottom-container { max-width: calc(100vw - 16px); }
      #map-title { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<div class="main">
  <div id="map">

    <div id="map-title"><span>ViralPin</span> - Location Finder</div>

    <!-- Navigation banner -->
    <div id="nav-panel">
      <span>🧭</span>
      <div id="nav-info">
        <div id="nav-dest-name">Calculating…</div>
        <div id="nav-details"></div>
      </div>
      <button id="nav-stop">✕ Stop</button>
    </div>

    <!-- Bottom panel -->
    <div id="bottom-container">

      <!-- Floating heatmap toggle -->
      <div id="heatmap-toggle-wrap">
        <button id="heat-btn" class="active">Heatmap</button>
      </div>

      <div id="map-bottom">

        <div id="pop-section">
          <span class="pop-label">Popularity</span>
          <button class="slider-adj" id="slider-minus">−</button>
          <input type="range" id="engagement-slider" min="1" max="60" value="30" step="1" />
          <button class="slider-adj" id="slider-plus">+</button>
          <span id="slider-value">Top 30</span>
        </div>

        <div id="search-panel">
          <div class="sp-header">
            <span>Search tags</span>
            <button id="search-close-btn">×</button>
          </div>
          <div id="tag-inputs"></div>
          <div class="sp-footer">
            <button id="add-tag-btn">+ Add tag</button>
            <button id="do-search-btn">Search</button>
          </div>
        </div>

        <div id="tag-row">
          <div id="search-pill-wrap">
            <div id="search-pill">
              <span class="search-icon">🔍</span>
              <span class="search-label">Search</span>
            </div>
          </div>
          <div id="tag-bar-wrap">
            <div id="tag-bar">
              <button class="tag-pill active" data-value="nature,landscape">Nature</button>
              <button class="tag-pill" data-value="mountain">Mountains</button>
              <button class="tag-pill" data-value="waterfall">Waterfalls</button>
              <button class="tag-pill" data-value="aurora,northernlights">Northern Lights</button>
              <button class="tag-pill" data-value="fjord">Fjords</button>
              <button class="tag-pill" data-value="streetphotography,street">Street Photography</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="status"></div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-info">
    <div id="lightbox-title"></div>
    <div id="lb-weather">
      <div id="lb-sun"></div>
      <div id="lb-hourly-wrap"><div id="lb-hourly"></div></div>
      <div id="lb-weekly"></div>
      <button id="lb-forecast-toggle">Weekly forecast ↓</button>
    </div>
    <div class="lb-links">
      <button id="lb-navigate">Navigate</button>
      <a id="lb-gmaps" href="#" target="_blank" rel="noopener">Open In Google Maps</a>
      <a id="lb-streetview" href="#" target="_blank" rel="noopener">Open In Street View</a>
    </div>
  </div>
</div>

<script>
// ─── Map ──────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true, tap: true }).setView([65.0, 15.0], 5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd", maxZoom: 20, detectRetina: true,
}).addTo(map);

// Navy tint overlay pane
const overlayPane = map.createPane("navyOverlay");
overlayPane.style.cssText = "z-index:250;pointer-events:none;background:rgba(8,22,80,0.20);";

// ─── State ────────────────────────────────────────────────────────────────────
let allPhotos    = [];
let photoById    = new Map();
let heatLayer    = null;
let clusterLayer = L.layerGroup();
// Label pane sits above cluster markers (default marker pane z-index is 600)
map.createPane("labelPane").style.zIndex = "640";
let labelLayer   = L.layerGroup().addTo(map);
let routeLayer   = null;
let showHeat     = true;
let currentTag   = "nature,landscape";
let topN         = 30;
let userMovedSlider = false;
let lastUserPos  = null;
let currentLbPhoto = null;
let labelGen     = 0;         // cancels in-flight geocoding on data change

// Perf: debounce timers
let renderTimer = null, fetchTimer = null, heatTimer = null, labelTimer = null;
const fetchedKeys = new Set();
const geocodeCache = new Map();
const MIN_FETCH_ZOOM = 4;

// ─── Quality filter ───────────────────────────────────────────────────────────
const BAD_WORDS = new Set(["selfie","portrait","baby","wedding","graduation",
  "birthday","party","family","friends","screenshot","whatsapp","instagram","profile"]);

function isGoodPhoto(ph) {
  if (!ph.url_sq || parseInt(ph.accuracy) < 10) return false;
  const t = (ph.title || "").toLowerCase();
  for (const w of BAD_WORDS) if (t.includes(w)) return false;
  return true;
}

// ─── Cell size by zoom ────────────────────────────────────────────────────────
const CELL_SIZES = [8,6,4,3,2.5,2,1,0.5,0.25,0.12,0.06,0.028,0.014,0.006];
function cellSize(z) { return z < CELL_SIZES.length ? CELL_SIZES[z] : 0; }

// ─── Cluster builder ──────────────────────────────────────────────────────────
function buildClusters(photos, zoom) {
  const cell = cellSize(zoom);
  if (cell === 0) return photos.map(p => ({ photos:[p], lat:p.lat, lng:p.lng, best:p }));
  const grid = new Map();
  for (const p of photos) {
    const key = `${Math.floor(p.lat/cell)},${Math.floor(p.lng/cell)}`;
    let g = grid.get(key);
    if (!g) { g = []; grid.set(key, g); }
    g.push(p);
  }
  return Array.from(grid.values(), g => {
    let best = g[0], lat = 0, lng = 0;
    for (const p of g) { lat += p.lat; lng += p.lng; if (p.views > best.views) best = p; }
    return { photos:g, lat:lat/g.length, lng:lng/g.length, best };
  });
}

// ─── Render clusters (rAF-gated) ─────────────────────────────────────────────
let rafPending = false;
function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; renderClusters(); });
}

function renderClusters() {
  clusterLayer.clearLayers();
  if (!allPhotos.length) return;
  const bounds = map.getBounds(), zoom = map.getZoom();
  const buf = Math.max(cellSize(zoom) * 1.5, 0.05);
  const S = bounds.getSouth()-buf, N = bounds.getNorth()+buf,
        W = bounds.getWest()-buf,  E = bounds.getEast()+buf;

  const inView = [];
  for (const p of allPhotos) {
    if (p.thumb && p.lat>=S && p.lat<=N && p.lng>=W && p.lng<=E) inView.push(p);
  }
  inView.sort((a,b) => b.views - a.views);
  const filtered = inView.slice(0, topN);

  const frag = document.createDocumentFragment();
  for (const cl of buildClusters(filtered, zoom)) {
    const single = cl.photos.length === 1;
    const sz = single ? 44 : 56;
    const icon = L.divIcon({
      className: "",
      html: `<div class="cm${single?" single":""}"><img class="thumb" src="${cl.best.thumb}" width="${sz}" height="${sz}"/>${!single?`<span class="badge">${fmt(cl.photos.length)}</span>`:""}</div>`,
      iconSize: [sz,sz+10], iconAnchor: [sz/2,sz+10],
    });
    L.marker([cl.lat,cl.lng],{icon})
      .on("click",()=>{ if(cl.photos.length===1) openLightbox(cl.best); else map.flyTo([cl.lat,cl.lng],Math.min(zoom+2,16),{duration:0.5}); })
      .addTo(clusterLayer);
  }
}

function fmt(n) { return n>=1000?(n/1000).toFixed(1).replace(".0","")+"k":String(n); }

// ─── Heatmap ──────────────────────────────────────────────────────────────────
const HEAT_GRADIENT = {0:"#0000cc",0.3:"#0088ff",0.55:"#00ffcc",0.75:"#ffdd00",0.9:"#ff4400",1:"#ff0000"};

// Radius grows with zoom so each spot covers a consistent geographic area.
// At low zoom many points overlap — keeping radius small prevents giant blobs.
function dynamicHeatOpts() {
  const zoom = map.getZoom();
  // Ramp from r=10 at zoom 4 up to r=36 at zoom 16, clamped at extremes.
  const radius = Math.max(8, Math.min(40, Math.round(10 + (zoom - 4) * 2.2)));
  return { radius, blur: Math.round(radius * 0.65) };
}

function buildHeatmap() {
  if (!showHeat || !allPhotos.length) {
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    return;
  }

  const bounds = map.getBounds();
  const buf = 0.15;
  const visPhotos = allPhotos.filter(p =>
    p.lat >= bounds.getSouth() - buf && p.lat <= bounds.getNorth() + buf &&
    p.lng >= bounds.getWest()  - buf && p.lng <= bounds.getEast()  + buf
  );
  if (!visPhotos.length) return;

  let maxV = 1;
  for (const p of visPhotos) if (p.views > maxV) maxV = p.views;
  const logMax = Math.log10(maxV + 1);
  const pts = visPhotos.map(p => [p.lat, p.lng, 0.08 + 0.92 * (Math.log10(p.views+1) / logMax)]);

  const { radius, blur } = dynamicHeatOpts();
  if (heatLayer) {
    heatLayer.setLatLngs(pts);
    // Update options if zoom changed (setOptions isn't in the public API; recreate cheaply)
    heatLayer.options.radius = radius;
    heatLayer.options.blur   = blur;
    heatLayer.redraw();
  } else {
    heatLayer = L.heatLayer(pts, {
      radius, blur, maxZoom:13, opacity:0.84, gradient:HEAT_GRADIENT,
    }).addTo(map);
  }
  clusterLayer.remove(); clusterLayer.addTo(map);
  scheduleLabels();
}

// During pinch-zoom Leaflet CSS-transforms the canvas but doesn't redraw pixels.
// Redraw each animation frame so the heatmap tracks zoom in real time.
// We skip `move` — panning is handled correctly by Leaflet's own transform.
let _heatRaf = null;
map.on("zoom", () => {
  if (!heatLayer) return;
  if (_heatRaf) return;
  _heatRaf = requestAnimationFrame(() => { _heatRaf = null; if (heatLayer) heatLayer.redraw(); });
});

function scheduleHeatmap() {
  clearTimeout(heatTimer);
  heatTimer = setTimeout(buildHeatmap, 400);
}

// ─── Heatmap toggle ───────────────────────────────────────────────────────────
const heatBtn = document.getElementById("heat-btn");

heatBtn.addEventListener("click", () => {
  showHeat = !showHeat;
  heatBtn.classList.toggle("active", showHeat);
  buildHeatmap();
  if (!showHeat) labelLayer.clearLayers();
});

// ─── Top-5 location labels ────────────────────────────────────────────────────
// Map Leaflet zoom → Nominatim zoom (controls specificity of reverse geocode)
function nominatimZoom(z) {
  if (z >= 16) return 18;   // building / specific peak / viewpoint
  if (z >= 13) return 16;   // named feature / street
  if (z >= 10) return 13;   // suburb / neighbourhood
  if (z >=  7) return 11;   // city / town
  return 8;                  // region / county
}

// Pick the best name field given map zoom level
function extractName(d, mapZoom) {
  const a = d.address || {};
  if (mapZoom >= 15) {
    // Very close: exact feature name first (peak, viewpoint, building, road)
    return d.name ||
           a.amenity || a.tourism || a.natural ||
           a.historic || a.leisure || a.man_made ||
           a.building || a.road ||
           a.neighbourhood || a.suburb || "";
  }
  if (mapZoom >= 12) {
    // Medium-close: named feature or neighbourhood
    return d.name ||
           a.tourism || a.natural || a.leisure ||
           a.neighbourhood || a.suburb ||
           a.village || a.town || "";
  }
  if (mapZoom >= 8) {
    // City/town level
    return a.village || a.town || a.city_district || a.city || d.name || "";
  }
  // Zoomed out: county / state
  return a.county || a.state || a.country || d.name || "";
}

async function geocode(lat, lng, mapZoom) {
  const nmZoom = nominatimZoom(mapZoom);
  const key    = `${lat.toFixed(3)},${lng.toFixed(3)},${nmZoom}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=${nmZoom}&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const name = extractName(d, mapZoom);
    geocodeCache.set(key, name);
    return name;
  } catch { return ""; }
}

function scheduleLabels() {
  clearTimeout(labelTimer);
  // Short delay after heatmap build; longer after map move (let tiles settle)
  labelTimer = setTimeout(updateLocationLabels, 800);
}

async function fadeOutLabels() {
  const els = document.querySelectorAll(".loc-label");
  if (!els.length) { labelLayer.clearLayers(); return; }
  els.forEach(el => el.classList.add("fading"));
  await sleep(320);
  labelLayer.clearLayers();
}

async function updateLocationLabels() {
  if (!showHeat || allPhotos.length === 0) {
    await fadeOutLabels(); return;
  }
  const gen    = ++labelGen;
  const zoom   = map.getZoom();
  const bounds = map.getBounds();
  const buf    = 0.02;

  const inView = allPhotos.filter(p =>
    p.lat >= bounds.getSouth()-buf && p.lat <= bounds.getNorth()+buf &&
    p.lng >= bounds.getWest()-buf  && p.lng <= bounds.getEast()+buf
  );
  if (!inView.length) { await fadeOutLabels(); return; }

  // Cluster visible photos, pick top-5 centroids
  const CELL = Math.max(cellSize(zoom) * 0.5, 0.01);
  const grid  = new Map();
  for (const p of inView) {
    const key = `${Math.round(p.lat/CELL)},${Math.round(p.lng/CELL)}`;
    let g = grid.get(key);
    if (!g) { g = {lat:0,lng:0,views:0,n:0}; grid.set(key,g); }
    g.lat += p.lat; g.lng += p.lng; g.views += p.views; g.n++;
  }
  const top5 = Array.from(grid.values())
    .sort((a,b) => b.views - a.views)
    .slice(0, 5)
    .map(g => ({ lat:g.lat/g.n, lng:g.lng/g.n }));

  // Fade out old labels then repopulate
  await fadeOutLabels();
  if (gen !== labelGen) return;

  for (let i = 0; i < top5.length; i++) {
    if (gen !== labelGen) return;
    const {lat, lng} = top5[i];
    const name = await geocode(lat, lng, zoom);
    if (gen !== labelGen) return;
    if (!name) continue;

    const icon = L.divIcon({
      className: "loc-icon",
      html: `<div class="loc-label"><span class="loc-dot"></span>${escHtml(name)}</div>`,
      iconSize: [0,0], iconAnchor: [0,0],
    });
    // Use the dedicated label pane so labels render above photo thumbnails
    L.marker([lat, lng], { icon, interactive:false, pane:"labelPane" })
      .addTo(labelLayer);

    if (i < top5.length - 1) await sleep(1100); // Nominatim: max 1 req/s
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Slider (reversed via scaleX(-1)) ────────────────────────────────────────
const slider    = document.getElementById("engagement-slider");
const sliderLbl = document.getElementById("slider-value");

function rescaleSlider() {
  const b = map.getBounds(), buf = 0.1;
  let n = 0;
  for (const p of allPhotos) {
    if (p.lat>=b.getSouth()-buf&&p.lat<=b.getNorth()+buf&&p.lng>=b.getWest()-buf&&p.lng<=b.getEast()+buf) n++;
  }
  slider.max = Math.max(n, 60);
  if (!userMovedSlider) { slider.value=30; topN=30; sliderLbl.textContent="Top 30"; }
}

function sliderStep() {
  if (topN <=  10) return 1;
  if (topN <=  30) return 1;
  if (topN <= 100) return 5;
  if (topN <= 300) return 10;
  return 25;
}

function applyTopN(val) {
  topN = Math.max(1, Math.min(parseInt(slider.max), val));
  slider.value = topN;
  sliderLbl.textContent = topN >= parseInt(slider.max) ? "All" : `Top ${topN}`;
  userMovedSlider = true;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(scheduleRender, 50);
}

slider.addEventListener("input", () => applyTopN(parseInt(slider.value)));
// "+" = more focused (fewer, more popular) | "−" = broader (more photos)
document.getElementById("slider-minus").addEventListener("click", () => applyTopN(topN + sliderStep()));
document.getElementById("slider-plus").addEventListener("click",  () => applyTopN(topN - sliderStep()));

// ─── Flickr API ───────────────────────────────────────────────────────────────
async function flickrFetch(extra) {
  const p = new URLSearchParams({
    method:"flickr.photos.search", api_key:CONFIG.FLICKR_API_KEY,
    has_geo:1, extras:"geo,url_sq,url_m,url_l,owner_name,views,title,accuracy",
    sort:"interestingness-desc", per_page:250,
    format:"json", nojsoncallback:1, content_type:1, media:"photos",
    ...(currentTag ? {tags:currentTag,tag_mode:"any"} : {}),
    ...extra,
  });
  const r = await fetch(`https://www.flickr.com/services/rest/?${p}`);
  if (!r.ok) throw new Error("Flickr HTTP " + r.status);
  const d = await r.json();
  if (d.stat !== "ok") throw new Error(d.message || "Flickr error");
  return d.photos;
}

function ingestPhoto(ph) {
  if (photoById.has(ph.id) || !isGoodPhoto(ph)) return false;
  const lat = parseFloat(ph.latitude), lng = parseFloat(ph.longitude);
  if (!lat && !lng) return false;
  const obj = { id:ph.id, title:ph.title||"Untitled", lat, lng,
    thumb:ph.url_sq, medium:ph.url_m, large:ph.url_l,
    owner:ph.owner, views:parseInt(ph.views)||0,
    url:`https://www.flickr.com/photos/${ph.owner}/${ph.id}` };
  allPhotos.push(obj); photoById.set(ph.id, obj);
  return true;
}

// ─── Fetch a bounding box ─────────────────────────────────────────────────────
function boxKey(bounds) {
  return `${bounds.getSouth().toFixed(2)},${bounds.getNorth().toFixed(2)},${bounds.getWest().toFixed(2)},${bounds.getEast().toFixed(2)}|${currentTag}`;
}

async function fetchBox(bounds, pages=3) {
  if (map.getZoom() < MIN_FETCH_ZOOM) return;
  const key = boxKey(bounds);
  if (fetchedKeys.has(key)) return;
  fetchedKeys.add(key);

  const w=Math.max(bounds.getWest(),-180), e=Math.min(bounds.getEast(),180);
  const s=Math.max(bounds.getSouth(),-90), n=Math.min(bounds.getNorth(),90);
  if (s>=n || w>=e) return;
  const bbox=`${w.toFixed(4)},${s.toFixed(4)},${e.toFixed(4)},${n.toFixed(4)}`;

  let added = 0;
  try {
    for (let p=1; p<=pages; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) if (ingestPhoto(ph)) added++;
      if (p >= pg.pages) break;
    }
    if (added > 0) {
      scheduleHeatmap(); rescaleSlider(); scheduleRender();
      document.getElementById("count-badge").textContent = `${allPhotos.length} spots`;
    }
  } catch(e) { console.warn("fetchBox:", e.message); }
}

// Silently preload surrounding 5×5 grid (radius=2, 24 tiles)
function preloadSurrounding() {
  if (map.getZoom() < MIN_FETCH_ZOOM + 2) return;
  const b = map.getBounds();
  const W = b.getEast()-b.getWest(), H = b.getNorth()-b.getSouth();
  for (let dx=-2; dx<=2; dx++) for (let dy=-2; dy<=2; dy++) {
    if (!dx && !dy) continue;
    const nb = L.latLngBounds(
      [b.getSouth()+dy*H, b.getWest()+dx*W],
      [b.getNorth()+dy*H, b.getEast()+dx*W]
    );
    fetchBox(nb, 2);
  }
}

// ─── Initial area load ────────────────────────────────────────────────────────
async function loadArea() {
  const status = document.getElementById("status");
  status.innerHTML = `<span class="loader"></span>Loading…`;
  clearAll(); clusterLayer.addTo(map);

  try {
    const b = map.getBounds();
    const bbox = `${Math.max(b.getWest(),-180).toFixed(4)},${Math.max(b.getSouth(),-90).toFixed(4)},${Math.min(b.getEast(),180).toFixed(4)},${Math.min(b.getNorth(),90).toFixed(4)}`;
    for (let p=1; p<=4; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) ingestPhoto(ph);
      if (p===1) { buildHeatmap(); rescaleSlider(); scheduleRender(); }
      else        { scheduleHeatmap(); }
      document.getElementById("count-badge").textContent = `${allPhotos.length} spots`;
      status.textContent = `${allPhotos.length} spots`;
      if (p >= pg.pages) break;
    }
    rescaleSlider(); scheduleRender();
    status.textContent = "";
    preloadSurrounding();
  } catch(err) { status.textContent = `⚠ ${err.message}`; }
}

// ─── Map events ───────────────────────────────────────────────────────────────
map.on("moveend zoomend", () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => { rescaleSlider(); scheduleRender(); }, 120);
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(() => fetchBox(map.getBounds(),3).then(preloadSurrounding), 700);
  if (showHeat) scheduleHeatmap();
});
// Labels trigger geocoding (slow network); only refresh when zoom level changes
map.on("zoomend", () => { if (showHeat) scheduleLabels(); });

// ─── Search panel ─────────────────────────────────────────────────────────────
const searchPanel  = document.getElementById("search-panel");
const tagInputsCtr = document.getElementById("tag-inputs");
const searchPill   = document.getElementById("search-pill");

function makeTagRow(ph="tag…") {
  const row = document.createElement("div");
  row.className = "tag-query-row";
  const inp = document.createElement("input");
  inp.type="text"; inp.className="tag-query"; inp.placeholder=ph;
  inp.addEventListener("keydown", e => { if(e.key==="Enter"){ e.preventDefault(); fireSearch(); } });
  const rm = document.createElement("button");
  rm.className="rm-tag-btn"; rm.textContent="×"; rm.type="button";
  rm.addEventListener("click",()=>{ if(tagInputsCtr.children.length>1) row.remove(); });
  row.append(inp,rm); return row;
}

function openSearchPanel() {
  document.querySelectorAll(".tag-pill").forEach(p=>p.classList.remove("active"));
  searchPill.classList.add("active");
  tagInputsCtr.innerHTML="";
  tagInputsCtr.appendChild(makeTagRow("e.g. sunset"));
  searchPanel.classList.add("open");
  setTimeout(()=>tagInputsCtr.querySelector(".tag-query").focus(),50);
}

function closeSearchPanel() {
  searchPanel.classList.remove("open");
  searchPill.classList.remove("active");
  tagInputsCtr.innerHTML="";
}

function fireSearch() {
  const tags = [...tagInputsCtr.querySelectorAll(".tag-query")]
    .map(i=>i.value.trim()).filter(Boolean);
  if (!tags.length) return;
  currentTag = tags.join(",");
  userMovedSlider = false;
  loadArea();
}

searchPill.addEventListener("click", () => {
  if (searchPanel.classList.contains("open")) closeSearchPanel(); else openSearchPanel();
});
document.getElementById("search-close-btn").addEventListener("click", closeSearchPanel);
document.getElementById("add-tag-btn").addEventListener("click", () => {
  tagInputsCtr.appendChild(makeTagRow("another tag…"));
  setTimeout(()=>tagInputsCtr.lastChild.querySelector(".tag-query").focus(),50);
});
document.getElementById("do-search-btn").addEventListener("click", fireSearch);

// ─── Clear ────────────────────────────────────────────────────────────────────
function clearAll() {
  allPhotos=[]; photoById.clear(); fetchedKeys.clear();
  clusterLayer.clearLayers(); clusterLayer.remove();
  labelLayer.clearLayers(); ++labelGen;
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer=null; }
  document.getElementById("count-badge").textContent="";
  userMovedSlider=false;
}

// ─── Navigation (OSRM) ───────────────────────────────────────────────────────
const navPanel = document.getElementById("nav-panel");

function fmtDuration(secs) {
  const m = Math.round(secs / 60);
  return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}m`;
}

async function navigateTo(ph) {
  closeLightbox();
  document.getElementById("nav-dest-name").textContent = ph.title;
  document.getElementById("nav-details").textContent = lastUserPos ? "Calculating…" : "Location unavailable";
  navPanel.classList.add("active");
  if (!lastUserPos) return;

  const {lat:uLat,lng:uLng} = lastUserPos;
  const coord = `${uLng},${uLat};${ph.lng},${ph.lat}`;
  try {
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coord}?overview=full&geometries=geojson`);
    const d = await r.json();
    if (d.code !== "Ok") throw new Error();
    const route = d.routes[0];
    const coords = route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(coords,{color:"#4d7fff",weight:5,opacity:0.88}).addTo(map);
    map.fitBounds(routeLayer.getBounds(),{paddingTopLeft:[20,80],paddingBottomRight:[20,120]});
    const km = (route.distance/1000).toFixed(1);
    const carTime  = fmtDuration(route.duration);
    // Walking speed ~5 km/h along road distance (OSRM foot profile is unreliable on public server)
    const walkSecs = (route.distance / 1000) / 5 * 3600;
    const footTime = fmtDuration(walkSecs);
    document.getElementById("nav-details").innerHTML =
      `${km} km<br>🚗 ${carTime}<br>🥾 ${footTime}`;
  } catch { document.getElementById("nav-details").textContent = "Route unavailable."; }
}

document.getElementById("nav-stop").addEventListener("click",()=>{
  navPanel.classList.remove("active");
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer=null; }
});

// ─── Lightbox ────────────────────────────────────────────────────────────────
const WX_ICON = c => {
  if (c === 0) return "☀️";
  if (c <= 3)  return "🌤";
  if (c <= 48) return "🌫";
  if (c <= 55) return "🌦";
  if (c <= 65) return "🌧";
  if (c <= 77) return "❄️";
  if (c <= 82) return "🌦";
  return "⛈";
};

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDay(iso) {
  return new Date(iso).toLocaleDateString([], { weekday: "short" });
}

async function loadWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&hourly=temperature_2m,weather_code&daily=sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min` +
    `&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url);
    const d = await r.json();

    // Sunrise / sunset today
    const rise = fmtTime(d.daily.sunrise[0]);
    const set  = fmtTime(d.daily.sunset[0]);
    document.getElementById("lb-sun").innerHTML =
      `<span>🌅 ${rise}</span><span>🌇 ${set}</span>`;

    // Next 24 h hourly (every 3 hrs, starting from current hour)
    const now = new Date();
    const nowH = now.getFullYear()*1e6 + (now.getMonth()+1)*1e4 + now.getDate()*100 + now.getHours();
    const items = [];
    for (let i = 0; i < d.hourly.time.length && items.length < 9; i++) {
      const t = new Date(d.hourly.time[i]);
      const tH = t.getFullYear()*1e6 + (t.getMonth()+1)*1e4 + t.getDate()*100 + t.getHours();
      if (tH < nowH || t.getHours() % 3 !== 0) continue;
      const label = items.length === 0 ? "Now" : t.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      items.push(`<div class="lb-h-item">
        <span class="lb-h-time">${label}</span>
        <span class="lb-h-icon">${WX_ICON(d.hourly.weather_code[i])}</span>
        <span class="lb-h-temp">${Math.round(d.hourly.temperature_2m[i])}°</span>
      </div>`);
    }
    document.getElementById("lb-hourly").innerHTML = items.join("");

    // Weekly forecast
    const days = d.daily.time.map((t,i) => `<div class="lb-d-item">
      <span class="lb-d-day">${i===0?"Today":fmtDay(t)}</span>
      <span class="lb-d-icon">${WX_ICON(d.daily.weather_code[i])}</span>
      <span class="lb-d-range">${Math.round(d.daily.temperature_2m_min[i])}° – ${Math.round(d.daily.temperature_2m_max[i])}°</span>
    </div>`);
    document.getElementById("lb-weekly").innerHTML = days.join("");
  } catch { document.getElementById("lb-sun").textContent = "Weather unavailable"; }
}

document.getElementById("lb-forecast-toggle").addEventListener("click", () => {
  const weekly = document.getElementById("lb-weekly");
  const btn    = document.getElementById("lb-forecast-toggle");
  const open   = weekly.classList.toggle("open");
  btn.textContent = open ? "Hide forecast ↑" : "Weekly forecast ↓";
});

function openLightbox(ph) {
  currentLbPhoto = ph;
  document.getElementById("lightbox-img").src = ph.large||ph.medium||ph.thumb;
  document.getElementById("lightbox-title").textContent = ph.title;
  document.getElementById("lb-gmaps").href = `https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}`;
  document.getElementById("lb-streetview").href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${ph.lat},${ph.lng}`;
  // Reset weather state
  document.getElementById("lb-sun").textContent = "Loading weather…";
  document.getElementById("lb-hourly").innerHTML = "";
  document.getElementById("lb-weekly").classList.remove("open");
  document.getElementById("lb-forecast-toggle").textContent = "Weekly forecast ↓";
  document.getElementById("lightbox").classList.add("open");
  loadWeather(ph.lat, ph.lng);
}
document.getElementById("lb-navigate").addEventListener("click",()=>{ if(currentLbPhoto) navigateTo(currentLbPhoto); });
document.getElementById("lightbox-close").addEventListener("click",closeLightbox);
document.getElementById("lightbox").addEventListener("click",e=>{ if(e.target===document.getElementById("lightbox")) closeLightbox(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeLightbox(); });
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); document.getElementById("lightbox-img").src=""; }

// ─── Live location ────────────────────────────────────────────────────────────
let locMarker=null, locCircle=null, hasPanned=false;
const locIcon=L.divIcon({className:"",html:`<div class="user-dot"><div class="ring"></div><div class="dot"></div></div>`,iconSize:[18,18],iconAnchor:[9,9]});
if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy}=pos.coords;
    lastUserPos={lat,lng};
    if (!hasPanned) { hasPanned=true; map.flyTo([lat,lng],9,{duration:2}); }
    if (!locMarker) {
      locMarker=L.marker([lat,lng],{icon:locIcon,zIndexOffset:2000}).addTo(map).bindTooltip("You are here",{direction:"top"});
      locCircle=L.circle([lat,lng],{radius:accuracy,color:"#4d9fff",fillColor:"#4d9fff",fillOpacity:0.07,weight:1,opacity:0.35}).addTo(map);
    } else { locMarker.setLatLng([lat,lng]); locCircle.setLatLng([lat,lng]).setRadius(accuracy); }
  },err=>console.warn("GPS:",err.message),{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ─── Block map interaction behind bottom UI ───────────────────────────────────
// Stops Leaflet from starting a drag/zoom when the user touches the bottom panel.
// The tag bar's own overflow-x scroll still works — the browser handles that
// natively before propagation is checked.
const bottomContainer = document.getElementById("bottom-container");
L.DomEvent.disableScrollPropagation(bottomContainer);
L.DomEvent.disableClickPropagation(bottomContainer);
bottomContainer.addEventListener("touchstart", e => e.stopPropagation(), { passive: true });
bottomContainer.addEventListener("touchmove",  e => e.stopPropagation(), { passive: true });

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadArea();
</script>

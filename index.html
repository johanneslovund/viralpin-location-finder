  <style>
    :root {
      --bg: #080d1a;
      --panel: rgba(6,12,32,0.52);
      --panel-blur: blur(22px) saturate(105%);
      --border: rgba(160,200,255,0.09);
      --border-strong: rgba(160,200,255,0.16);
      --accent: #2a50e0; --text: #c4ccdf;
      --muted: #4e5e7a; --pill-active-bg: rgba(20,40,110,0.65); --pill-active-border: rgba(40,72,180,0.75);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --glass-shine: inset 0 1px 0 rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── Loading screen ── */
    #loading-bg {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: #0a0f1e;
      transition: opacity 3s ease;
    }
    #loading-bg.fade-out { opacity: 0; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 3s ease;
    }
    #loading-screen.fade-out { opacity: 0; }
    #loading-logo { width: min(260px, 65vw); height: auto; filter: drop-shadow(0 2px 24px rgba(0,0,0,0.9)); }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 2px solid #1a2550;
      border-top-color: #00cc88;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loading-text { font-size: 0.85rem; color: #5a6898; letter-spacing: 0.08em; }

    /* ── Map fills full viewport ── */
    .main { position: fixed; inset: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; z-index: 1; background: var(--bg); }

    /* ── Logo ── */
    #map-title {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800; pointer-events: none;
    }
    #map-title img {
      height: 40px; width: auto; display: block;
      filter: drop-shadow(0 1px 8px rgba(0,0,0,0.8));
    }
    .leaflet-tile-pane { filter: saturate(0.75) brightness(1.18) hue-rotate(170deg); }

    /* ── Location search bar ── */
    #loc-search-wrap {
      position: absolute;
      top: calc(62px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 850;
      width: min(340px, calc(100vw - 80px));
    }
    #loc-search {
      width: 100%; background: var(--panel); border: 1px solid var(--border-strong);
      color: #c8ccdf; border-radius: 22px; padding: 9px 16px;
      font-size: 0.82rem; outline: none; font-family: inherit;
      backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      -webkit-appearance: none;
      box-shadow: var(--glass-shine), 0 4px 24px rgba(0,0,0,0.4);
    }
    #loc-search::placeholder { color: #3a4268; }
    #loc-search:focus { border-color: #2a4aaf; }
    #top-action-btns {
      display: flex; gap: 8px; margin-top: 8px; justify-content: center;
    }
    #top-action-btns button {
      background: var(--panel); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 20px; padding: 7px 14px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      min-height: 34px; -webkit-user-select: none; user-select: none;
      white-space: nowrap; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      font-family: inherit;
    }
    #top-action-btns button:active { opacity: 0.7; }
    #loc-results {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: rgba(6,11,28,0.95); border: 1px solid #182040; border-radius: 14px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      overflow: hidden; box-shadow: 0 6px 30px rgba(0,0,0,0.7);
    }
    #loc-results.open { display: block; }
    .loc-result-item {
      padding: 10px 16px; font-size: 0.78rem; color: #8898c8; cursor: pointer;
      border-bottom: 1px solid #101830;
    }
    .loc-result-item:last-child { border-bottom: none; }
    .loc-result-item:active { background: rgba(58,90,232,0.15); }
    .loc-result-name { color: #c0d0ff; font-weight: 600; }
    .loc-result-detail { font-size: 0.68rem; color: #4a5888; margin-top: 2px; }

    /* ── Bottom container: two stacked floating panels ── */
    #bottom-container {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: min(540px, calc(100vw - 16px));
      contain: layout style;
      will-change: transform;
    }

    /* ── Floating button row (heatmap + reset + my locations) ── */
    #heatmap-toggle-wrap {
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      gap: 10px; width: 100%; position: relative;
    }
    #heat-btn {
      background: var(--panel); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
      min-height: 34px; -webkit-user-select: none; user-select: none;
      box-shadow: var(--glass-shine);
    }
    #heat-btn.active {
      background: linear-gradient(135deg, #b83a00, #ff7700);
      border-color: #ffaa44; color: #fff8ee; font-weight: 700;
      box-shadow: 0 0 22px rgba(255,120,0,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
      text-shadow: 0 1px 6px rgba(160,50,0,0.5);
      animation: heat-btn-pulse 3s ease-in-out infinite;
    }
    @keyframes heat-btn-pulse {
      0%,100% { box-shadow: 0 0 14px rgba(255,100,0,0.45), 0 0 28px rgba(255,60,0,0.15); }
      50%      { box-shadow: 0 0 26px rgba(255,160,0,0.65), 0 0 48px rgba(255,80,0,0.3); }
    }
    #heat-btn:active { opacity: 0.75; }

    /* ── Aurora button + legend ── */
    #aurora-btn {
      background: var(--panel); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
      min-height: 34px; -webkit-user-select: none; user-select: none;
      box-shadow: var(--glass-shine);
    }

    /* Aurora legend — vertical bar on left */
    #aurora-legend {
      display: none; position: absolute; left: 14px;
      top: 50%; transform: translateY(-50%);
      z-index: 810; padding: 4px;
    }
    #aurora-legend.visible { display: flex; align-items: center; }
    #aurora-legend-inner { display: flex; gap: 8px; align-items: stretch; }
    #aurora-legend-bar {
      width: 13px; height: 120px; border-radius: 6px; position: relative; overflow: hidden; flex-shrink: 0;
      background: linear-gradient(to bottom,
        #b268fb 0%, #2af373 38%, #009b95 68%, #a3cab7 100%);
      box-shadow: 0 0 10px rgba(42,243,115,0.25);
    }
    #aurora-legend-bar::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      animation: aurora-legend-wave 2.4s ease-in-out infinite;
      border-radius: 6px;
    }
    @keyframes aurora-legend-wave {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    .aurora-legend-labels {
      display: flex; flex-direction: column; justify-content: space-between;
      height: 120px; font-size: 0.6rem; white-space: nowrap;
    }
    #aurora-btn.active {
      background: linear-gradient(135deg, #004d1a, #00cc55);
      border-color: #00ff88; color: #ccffe0; font-weight: 700;
      box-shadow: 0 0 22px rgba(0,255,120,0.5), 0 0 40px rgba(100,0,255,0.2);
      animation: aurora-btn-pulse 3s ease-in-out infinite;
    }
    @keyframes aurora-btn-pulse {
      0%,100% { box-shadow: 0 0 16px rgba(0,255,120,0.45), 0 0 32px rgba(80,0,200,0.15); }
      50%      { box-shadow: 0 0 28px rgba(0,255,120,0.7), 0 0 56px rgba(160,0,255,0.35); }
    }
    #aurora-btn:active { opacity: 0.75; }

    /* ── Database picker ── */
    #db-btn {
      background: var(--panel); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      min-height: 34px; -webkit-user-select: none; user-select: none;
      box-shadow: var(--glass-shine);
    }
    #db-btn.open { background: rgba(50,70,160,0.4); border-color: rgba(100,140,255,0.4); color: #c0d0ff; }
    #db-btn:active { opacity: 0.75; }
    #db-picker {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--border-strong); border-radius: 14px;
      backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      box-shadow: var(--glass-shine), 0 4px 24px rgba(0,0,0,0.5);
      overflow: hidden; min-width: 160px; z-index: 820;
    }
    #db-picker.open { display: block; }
    .db-opt {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: none; border: none; color: #7888b8; cursor: pointer;
      padding: 10px 16px; font-size: 0.76rem; font-family: inherit; text-align: left;
      border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .db-opt:last-child { border-bottom: none; }
    .db-opt:active { background: rgba(255,255,255,0.05); }
    .db-opt.active { color: #c0d0ff; font-weight: 600; }
    .db-opt .db-check { margin-left: auto; opacity: 0; }
    .db-opt.active .db-check { opacity: 1; }

    /* ── Webcam button + picker ── */
    #cam-btn {
      background: var(--panel); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      transition: background 0.15s, color 0.15s; min-height: 34px;
      -webkit-user-select: none; user-select: none; box-shadow: var(--glass-shine);
    }
    #cam-btn.has-active { background: rgba(0,140,200,0.3); border-color: rgba(0,200,255,0.4); color: #80e8ff; }
    #cam-btn:active { opacity: 0.75; }
    #cam-picker {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--border-strong); border-radius: 14px;
      backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      box-shadow: var(--glass-shine), 0 4px 24px rgba(0,0,0,0.5);
      min-width: 210px; z-index: 820; padding: 8px 0;
    }
    #cam-picker.open { display: block; }
    .cam-toggle-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; cursor: pointer; transition: background 0.1s;
    }
    .cam-toggle-row:active { background: rgba(255,255,255,0.04); }
    .cam-toggle-label { font-size: 0.76rem; color: #8898b8; flex: 1; }
    .cam-toggle-label b { display: block; color: #c0d0e8; font-size: 0.78rem; }
    .cam-toggle-label small { font-size: 0.62rem; color: var(--muted); }
    .cam-toggle-switch {
      width: 36px; height: 20px; border-radius: 10px; background: #1a2550;
      border: 1px solid var(--border-strong); position: relative; flex-shrink: 0;
      transition: background 0.2s;
    }
    .cam-toggle-switch::after {
      content: ""; position: absolute; width: 14px; height: 14px;
      border-radius: 50%; background: #4a5a88; top: 2px; left: 2px; transition: 0.2s;
    }
    .cam-toggle-row.on .cam-toggle-switch { background: rgba(0,160,220,0.5); border-color: #00aadd; }
    .cam-toggle-row.on .cam-toggle-switch::after { left: 18px; background: #00ddff; }
    #windy-key-wrap { padding: 4px 14px 10px; border-top: 1px solid var(--border); margin-top: 4px; }
    #windy-key-wrap label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
    #windy-key-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-strong); color: #c0d0ff; border-radius: 8px; padding: 5px 8px; font-size: 0.68rem; outline: none; font-family: inherit; }

    /* ── Webcam map markers ── */
    .cam-marker {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .cam-scenic { background: rgba(0,140,200,0.85); border: 2px solid #00ddff; }
    .cam-road   { background: rgba(180,80,0,0.85);  border: 2px solid #ff9933; }

    /* ── Webcam viewer modal ── */
    #cam-modal {
      display: none; position: fixed; inset: 0; z-index: 9500;
      background: rgba(0,0,0,0.9); flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    #cam-modal.open { display: flex; }
    #cam-modal-inner {
      background: var(--panel); border: 1px solid var(--border-strong);
      border-radius: 18px; overflow: hidden; max-width: 540px; width: 100%;
      backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      box-shadow: var(--glass-shine), 0 8px 40px rgba(0,0,0,0.6);
    }
    #cam-img { width: 100%; display: block; background: #0a0f1e; min-height: 200px; object-fit: cover; }
    #cam-info { padding: 12px 16px; }
    #cam-title { font-size: 0.88rem; font-weight: 700; color: #dde2f5; margin-bottom: 4px; }
    #cam-meta  { font-size: 0.68rem; color: var(--muted); }
    #cam-footer { display: flex; gap: 8px; padding: 0 16px 14px; flex-wrap: wrap; }
    .cam-link { color: #7c9fff; font-size: 0.72rem; text-decoration: none; border: 1px solid #1a2e7a; border-radius: 6px; padding: 6px 10px; background: rgba(10,20,60,0.6); }
    #cam-close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #888; font-size: 1.8rem; cursor: pointer; }


    /* Main panel: slider + tags */
    #map-bottom {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; width: 100%;
      backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
      box-shadow: var(--glass-shine), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Popularity slider */
    #pop-section {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px 6px; border-bottom: 1px solid #101830;
    }
    .pop-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
    #engagement-slider {
      flex: 1; appearance: none; -webkit-appearance: none;
      height: 2px; background: #1a2550; border-radius: 2px; outline: none; cursor: pointer;
      touch-action: none;
    }
    #engagement-slider::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff;
      cursor: grab; box-shadow: 0 0 10px rgba(58,90,232,0.4);
    }
    #engagement-slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff; cursor: grab;
    }
    #slider-value { font-size: 0.67rem; color: #6878b0; font-weight: 600; white-space: nowrap; min-width: 56px; text-align: right; }
    .slider-adj {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-strong); color: #7888b8;
      border-radius: 6px; width: 26px; height: 26px; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0; line-height: 1; font-weight: 400;
      transition: background 0.1s, color 0.1s;
    }
    .slider-adj:active { background: #1a2e7a; color: #c0d0ff; border-color: #3354c4; }

    /* Search panel */
    #search-panel { display: none; padding: 9px 14px 7px; border-bottom: 1px solid #101830; flex-direction: column; gap: 6px; }
    #search-panel.open { display: flex; }
    .sp-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    #search-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .tag-query-row { display: flex; align-items: center; gap: 6px; }
    .tag-query {
      flex: 1; background: #0d1428; border: 1px solid #1a2448; color: #c0d0ff;
      border-radius: 8px; padding: 7px 10px; font-size: 0.8rem; outline: none;
      -webkit-appearance: none; min-height: 36px;
    }
    .tag-query::placeholder { color: #2a3460; }
    .tag-query:focus { border-color: #2a4aaf; }
    .rm-tag-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .sp-footer { display: flex; gap: 8px; margin-top: 2px; }
    #add-tag-btn { background: none; border: 1px solid #1a2448; color: #4a5888; border-radius: 8px; padding: 6px 12px; font-size: 0.72rem; cursor: pointer; min-height: 34px; }
    #do-search-btn { background: #1a2e7a; border: 1px solid #2a4aaf; color: #a8bfff; border-radius: 8px; padding: 6px 16px; font-size: 0.72rem; cursor: pointer; font-weight: 600; margin-left: auto; min-height: 34px; }

    /* Tag row: scrollable pills + pinned Search */
    #tag-row {
      display: flex; align-items: stretch; min-height: 48px; overflow: hidden;
    }
    #tag-bar-wrap {
      flex: 1 1 0; min-width: 0; position: relative; overflow: hidden;
      /* Fade edges using mask so only opacity changes, not color */
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
    }
    #tag-bar {
      display: flex; gap: 7px; align-items: center; flex-wrap: nowrap;
      padding: 7px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; width: 100%; height: 100%;
    }
    #tag-bar::-webkit-scrollbar { display: none; }
    .tag-pill {
      background: transparent; border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 13px; font-size: 0.76rem; cursor: pointer;
      font-weight: 500; white-space: nowrap; flex-shrink: 0;
      min-height: 34px; transition: background 0.12s, color 0.12s, border-color 0.12s;
      -webkit-user-select: none; user-select: none;
    }
    .tag-pill:active { opacity: 0.7; }
    .tag-pill.active { background: var(--pill-active-bg); border-color: var(--pill-active-border); color: #c0d0ff; font-weight: 600; }

    /* Search pill — always visible, pinned LEFT, never shrinks */
    #search-pill-wrap {
      flex: 0 0 auto; display: flex; align-items: center;
      padding: 7px 8px 7px 10px;
      border-right: 1px solid #182040;
    }
    #search-pill {
      display: flex; align-items: center; gap: 5px;
      border: 1px solid #1e2d50; border-radius: 20px; padding: 6px 12px;
      cursor: pointer; white-space: nowrap; min-height: 34px;
      -webkit-user-select: none; user-select: none;
    }
    #search-pill:active { opacity: 0.7; }
    #search-pill.active { border-color: var(--pill-active-border); background: #111e38; }
    .search-icon { font-size: 0.76rem; color: #5868a0; }
    .search-label { font-size: 0.76rem; color: #5868a0; font-weight: 500; }

    /* ── Nav panel ── */
    #nav-panel {

    <div class="lb-links">
      <button id="lb-navigate">Navigate</button>
      <a id="lb-gmaps" href="#" target="_blank" rel="noopener">Google Maps</a>
      <a id="lb-apmaps" href="#" target="_blank" rel="noopener">Apple Maps</a>
      <a id="lb-streetview" href="#" target="_blank" rel="noopener">Street View</a>
      <button id="lb-save">⭐ Save Location</button>
    </div>
    <div id="lb-weather">
      <div id="lb-sun"></div>
      <div id="lb-hourly-wrap"><div id="lb-hourly"></div></div>
      <div id="lb-weekly"></div>
      <button id="lb-forecast-toggle">Weekly forecast ↓</button>
    </div>
  </div>
  <button id="lightbox-close">Close</button>
</div>

<script>
// ─── Map ──────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true, tap: true, zoomSnap: 0.25 }).setView([30.0, 0.0], 1.5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd", maxZoom: 20, detectRetina: true,
}).addTo(map);

// Navy tint overlay pane
const overlayPane = map.createPane("navyOverlay");
overlayPane.style.cssText = "z-index:250;pointer-events:none;background:rgba(8,22,80,0.20);";

// ─── State ────────────────────────────────────────────────────────────────────
let allPhotos    = [];
let photoById    = new Map();
let heatLayer    = null;
let clusterLayer = L.layerGroup().addTo(map);
map.createPane("labelPane").style.zIndex = "640";
let labelLayer   = L.layerGroup().addTo(map);
let routeLayer   = null;
let showHeat     = false;
let currentTag   = "nature,landscape";
let topN         = 30;
let userMovedSlider = false;
let lastUserPos  = null;
let currentLbPhoto = null;
let labelGen     = 0;

// Gallery state
let galleryPhotos = [];
let galleryIndex  = 0;

// Perf: debounce timers
let renderTimer = null, fetchTimer = null, heatTimer = null, labelTimer = null;
let heatLastRun = 0;
const fetchedKeys = new Set();
const geocodeCache = new Map();
const MIN_FETCH_ZOOM = 4;

// Full weather data storage for day-click hourly
let fullWeatherData = null;

// ─── Quality filter ───────────────────────────────────────────────────────────
const BAD_WORDS = new Set(["selfie","portrait","baby","wedding","graduation",
  "birthday","party","family","friends","screenshot","whatsapp","instagram","profile"]);

function isGoodPhoto(ph) {
  if (!ph.url_sq || parseInt(ph.accuracy) < 10) return false;
  const t = (ph.title || "").toLowerCase();
  for (const w of BAD_WORDS) if (t.includes(w)) return false;
  return true;
}

// ─── Cell size by zoom ────────────────────────────────────────────────────────
const CELL_SIZES = [8,6,4,3,2.5,2,1,0.5,0.25,0.12,0.06,0.028,0.014,0.006];
function cellSize(z) { return z < CELL_SIZES.length ? CELL_SIZES[z] : 0; }

// ─── Cluster builder ──────────────────────────────────────────────────────────
function buildClusters(photos, zoom) {
  const cell = cellSize(zoom);
  if (cell === 0) return photos.map(p => ({ photos:[p], lat:p.lat, lng:p.lng, best:p }));
  const grid = new Map();
  for (const p of photos) {
    const key = `${Math.floor(p.lat/cell)},${Math.floor(p.lng/cell)}`;
    let g = grid.get(key);
    if (!g) { g = []; grid.set(key, g); }
    g.push(p);
  }
  return Array.from(grid.values(), g => {
    let best = g[0], lat = 0, lng = 0;
    for (const p of g) { lat += p.lat; lng += p.lng; if (p.views > best.views) best = p; }
    return { photos:g, lat:lat/g.length, lng:lng/g.length, best };
  });
}

// ─── Render clusters ─────────────────────────────────────────────────────────
let renderScheduled = false;

function scheduleRender() {
  if (renderScheduled || showScenicCams || showRoadCams) return; // skip in webcam mode
  renderScheduled = true;
  setTimeout(() => { renderScheduled = false; renderClusters(); }, 120);
}

function renderClusters() {
  if (!allPhotos.length) return;
  const bounds = map.getBounds(), zoom = map.getZoom();

  const buf = Math.max(cellSize(zoom) * 1.5, 0.05);
  const S = bounds.getSouth()-buf, N = bounds.getNorth()+buf,
        W = bounds.getWest()-buf,  E = bounds.getEast()+buf;

  const inView = [];
  for (const p of allPhotos) {
    if (p.thumb && p.lat>=S && p.lat<=N && p.lng>=W && p.lng<=E) inView.push(p);
  }
  inView.sort((a,b) => b.views - a.views);
  const filtered = inView.slice(0, topN);

  clusterLayer.clearLayers();
  for (const cl of buildClusters(filtered, zoom)) {
    const single = cl.photos.length === 1;
    const sz = single ? 44 : 56;
    const icon = L.divIcon({
      className: "",
      html: `<div class="cm${single?" single":""}"><img class="thumb" src="${cl.best.thumb}" width="${sz}" height="${sz}"/>${!single?`<span class="badge">${fmt(cl.photos.length)}</span>`:""}</div>`,
      iconSize: [sz,sz+10], iconAnchor: [sz/2,sz+10],
    });
    L.marker([cl.lat,cl.lng],{icon})
      .on("click",()=>{ if(cl.photos.length===1) openLightbox(cl.best); else map.flyTo([cl.lat,cl.lng],Math.min(zoom+2,16),{duration:0.5}); })
      .addTo(clusterLayer);
  }
}

function fmt(n) { return n>=1000?(n/1000).toFixed(1).replace(".0","")+"k":String(n); }

// ─── Heatmap ──────────────────────────────────────────────────────────────────
const HEAT_GRADIENT = {0:"#0000cc",0.3:"#0088ff",0.55:"#00ffcc",0.75:"#ffdd00",0.9:"#ff4400",1:"#ff0000"};

function dynamicHeatOpts() {
  const zoom = map.getZoom();
  const radius = Math.max(8, Math.min(40, Math.round(10 + (zoom - 4) * 2.2)));
  return { radius, blur: Math.round(radius * 0.65) };
}

function buildHeatmap() {

  if (!showHeat || !allPhotos.length) {
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    return;
  }

  const bounds = map.getBounds();
  const buf = 0.15;
  const visPhotos = allPhotos.filter(p =>
    p.lat >= bounds.getSouth()-buf && p.lat <= bounds.getNorth()+buf &&
    p.lng >= bounds.getWest()-buf  && p.lng <= bounds.getEast()+buf
  );
  if (!visPhotos.length) return;

  let maxV = 1;
  for (const p of visPhotos) if (p.views > maxV) maxV = p.views;
  const logMax = Math.log10(maxV + 1);
  const pts = visPhotos.map(p => [p.lat, p.lng, 0.08 + 0.92 * (Math.log10(p.views+1) / logMax)]);

  const { radius, blur } = dynamicHeatOpts();
  if (heatLayer) {
    heatLayer.setLatLngs(pts);
    heatLayer.options.radius = radius;
    heatLayer.options.blur   = blur;
    heatLayer.redraw();
  } else {
    heatLayer = L.heatLayer(pts, {
      radius, blur, maxZoom:13, opacity:0.84, gradient:HEAT_GRADIENT,
    }).addTo(map);
  }
  clusterLayer.remove(); clusterLayer.addTo(map);
}


function scheduleHeatmap() {
  clearTimeout(heatTimer);
  heatTimer = setTimeout(buildHeatmap, 600);
}

// ─── Heatmap toggle ───────────────────────────────────────────────────────────
const heatBtn = document.getElementById("heat-btn");

heatBtn.addEventListener("click", () => {
  showHeat = !showHeat;
  heatBtn.classList.toggle("active", showHeat);
  // Mutual exclusion — turn off aurora
  if (showHeat && showAurora) {
    showAurora = false;
    auroraBtn.classList.remove("active");
    stopAurora();
  }
  buildHeatmap();
  if (!showHeat) labelLayer.clearLayers();
});

// Keep heatmap canvas in sync during pinch-zoom (RAF-throttled)
let _heatRaf = null;
map.on("zoom", () => {
  if (!heatLayer) return;
  if (_heatRaf) return;
  _heatRaf = requestAnimationFrame(() => {
    _heatRaf = null;
    if (heatLayer) heatLayer.redraw();
  });
});

// ─── Aurora overlay (uses leaflet-heat for smooth rendering) ──────────────────
let showAurora   = false;
let auroraCoords = [];
let auroraLayer  = null;
let auroraTimer  = null;

const AURORA_GRADIENT = {
  0:    "#050e08",
  0.25: "#a3cab7",
  0.55: "#009b95",
  0.78: "#2af373",
  1:    "#b268fb"
};
const auroraBtn = document.getElementById("aurora-btn");

function buildAuroraLayer() {
  if (auroraLayer) { map.removeLayer(auroraLayer); auroraLayer = null; }
  if (!showAurora || !auroraCoords.length) return;

  const bounds = map.getBounds();
  const buf = 3;
  const visible = auroraCoords.filter(([lng, lat, i]) =>
    i >= 10 &&
    lat >= bounds.getSouth()-buf && lat <= bounds.getNorth()+buf &&
    lng >= bounds.getWest()-buf  && lng <= bounds.getEast()+buf
  );
  if (!visible.length) return;

  let maxI = 1;
  for (const [,,i] of visible) if (i > maxI) maxI = i;

  // [lat, lng, normalised_weight] — same format as photo heatmap
  const pts = visible.map(([lng, lat, i]) => [lat, lng, i / maxI]);

  const { radius, blur } = dynamicHeatOpts();
  auroraLayer = L.heatLayer(pts, {
    radius: radius * 4,   // large enough to fully merge the 1°-grid NOAA points
    blur:   radius * 5,   // heavy blur eliminates grid artefacts
    maxZoom: 12,
    opacity: 0.82,
    gradient: AURORA_GRADIENT,
  }).addTo(map);
  // No clusterLayer reorder needed — aurora is added first so clusters stay on top
}

async function fetchAuroraData() {
  try {
    const r = await fetch("https://services.swpc.noaa.gov/json/ovation_aurora_latest.json");
    const d = await r.json();
    auroraCoords = d.coordinates || [];
    buildAuroraLayer();
  } catch(e) { console.warn("Aurora:", e); }
}

function startAurora() {
  fetchAuroraData();
  clearInterval(auroraTimer);
  auroraTimer = setInterval(fetchAuroraData, 5 * 60 * 1000);
  map.on("moveend zoomend", buildAuroraLayer);
}

function stopAurora() {
  clearInterval(auroraTimer);
  map.off("moveend zoomend", buildAuroraLayer);
  if (auroraLayer) { map.removeLayer(auroraLayer); auroraLayer = null; }
}

const auroraLegend = document.getElementById("aurora-legend");

auroraBtn.addEventListener("click", () => {
  showAurora = !showAurora;
  auroraBtn.classList.toggle("active", showAurora);
  auroraLegend.classList.toggle("visible", showAurora);
  // Mutual exclusion — turn off heatmap
  if (showAurora && showHeat) {
    showHeat = false;
    heatBtn.classList.remove("active");
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    labelLayer.clearLayers();
  }
  if (showAurora) startAurora(); else stopAurora();
});

// ─── Webcam layer ─────────────────────────────────────────────────────────────
let showScenicCams = false, showRoadCams = false;
let windyApiKey    = localStorage.getItem("windyApiKey") || CONFIG.WINDY_API_KEY;
const camLayer     = L.layerGroup().addTo(map);
let camRefreshId   = null;
let camImgRefreshId = null;

const scenicRow = document.getElementById("cam-scenic-row");
const roadRow   = document.getElementById("cam-road-row");

function updateCamToggleUI() {
  scenicRow.classList.toggle("on", showScenicCams);
  roadRow.classList.toggle("on", showRoadCams);
}

function disableWebcams() {
  showScenicCams = false; showRoadCams = false;
  updateCamToggleUI(); camLayer.clearLayers(); clearTimeout(camRefreshId);
}

scenicRow.addEventListener("click", e => {
  e.stopPropagation(); // keep picker open
  showScenicCams = !showScenicCams;
  if (showScenicCams || showRoadCams) {
    // Switching to webcam mode — clear photos
    clearAll(); clusterLayer.addTo(map);
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    document.querySelectorAll(".db-opt").forEach(o => o.classList.remove("active"));
  }
  updateCamToggleUI(); refreshWebcams();
});

roadRow.addEventListener("click", e => {
  e.stopPropagation();
  showRoadCams = !showRoadCams;
  if (showScenicCams || showRoadCams) {
    clearAll(); clusterLayer.addTo(map);
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    document.querySelectorAll(".db-opt").forEach(o => o.classList.remove("active"));
  }
  updateCamToggleUI(); refreshWebcams();
});

function addCamMarker(lat, lng, title, imgUrl, type, extUrl) {
  const icon = L.divIcon({
    className: "",
    html: `<div class="cam-marker cam-${type}">📹</div>`,
    iconSize:[28,28], iconAnchor:[14,14]
  });
  L.marker([lat,lng], {icon, zIndexOffset:500})
    .on("click", () => openCamModal(title, imgUrl, type, extUrl))
    .addTo(camLayer);
}

// Fetch all Norwegian road cameras once — only ~400, avoid bbox CORS issues
let vegvesenCacheAll = null;
async function getVegvesenAll() {
  if (vegvesenCacheAll) return vegvesenCacheAll;
  let all = [];
  let start = 0;
  while (true) {
    const r = await fetch(
      `https://nvdbapiles-v3.atlas.vegvesen.no/vegobjekter/95?srid=wgs84&antall=500&start=${start}`,
      { headers: { 'Accept': 'application/vnd.vegvesen.nvdb-v3+json, application/json' } }
    );
    if (!r.ok) break;
    const d = await r.json();
    all = all.concat(d.objekter || []);
    if (!d.metadata?.neste?.start) break;
    start = d.metadata.neste.start;
  }
  vegvesenCacheAll = all;
  return all;
}

async function loadVegvesen(bounds) {
  try {
    const all = await getVegvesenAll();
    const S=bounds.getSouth(), N=bounds.getNorth(), W=bounds.getWest(), E=bounds.getEast();
    for (const obj of all) {
      const wkt = obj.lokasjon?.geometri?.wkt || "";
      const m = wkt.match(/POINT\s*\(\s*([0-9.-]+)\s+([0-9.-]+)\s*\)/);
      if (!m) continue;
      const lng=parseFloat(m[1]), lat=parseFloat(m[2]);
      if (lat<S||lat>N||lng<W||lng>E) continue; // filter to visible bounds client-side
      const name = obj.egenskaper?.find(e=>e.navn==="Navn")?.verdi || `Kamera ${obj.id}`;
      const imgUrl = `https://webkamera.atlas.vegvesen.no/public/kamera?id=${obj.id}&ts=${Date.now()}`;
      addCamMarker(lat, lng, name, imgUrl, "road",
        `https://www.vegvesen.no/trafikk-og-vegkart/#Kamera?kameraId=${obj.id}`);
    }
  } catch(e) { console.warn("Vegvesen:", e.message); }
}

async function loadWindy(bounds) {
  if (!windyApiKey) return;
  const S=bounds.getSouth().toFixed(4), W=bounds.getWest().toFixed(4);
  const N=bounds.getNorth().toFixed(4), E=bounds.getEast().toFixed(4);
  try {
    // Windy Webcams API v3
    const r = await fetch(
      `https://api.windy.com/webcams/api/v3/webcams?boundingBox=${S},${W},${N},${E}&limit=100&include=location,images`,
      { headers:{ 'Authorization': `Bearer ${windyApiKey}` } }
    );
    if (!r.ok) { console.warn("Windy HTTP", r.status); return; }
    const d = await r.json();
    for (const cam of (d.webcams || [])) {
      const lat = cam.location?.latitude;
      const lng = cam.location?.longitude;
      if (!lat || !lng) continue;
      const img = cam.images?.current?.preview || "";
      addCamMarker(lat, lng, cam.title, img, "scenic",
        `https://windy.com/webcams/${cam.id}`);
    }
  } catch(e) { console.warn("Windy:", e.message); }
}

async function refreshWebcams() {
  camLayer.clearLayers();
  clearTimeout(camRefreshId);
  if (!showScenicCams && !showRoadCams) return;
  document.getElementById("status").textContent = "Loading webcams…";
  const b = map.getBounds();
  const tasks = [];
  if (showRoadCams)   tasks.push(loadVegvesen(b));
  if (showScenicCams) tasks.push(loadWindy(b));
  await Promise.all(tasks);
  const n = camLayer.getLayers().length;
  document.getElementById("status").textContent = n ? `${n} webcams` : "No webcams in view";
  setTimeout(() => { document.getElementById("status").textContent = ""; }, 4000);
  camRefreshId = setTimeout(refreshWebcams, 90000);
}

map.on("moveend zoomend", () => {
  if (showScenicCams || showRoadCams) {
    clearTimeout(camRefreshId);
    camRefreshId = setTimeout(refreshWebcams, 800);
  }
});

// ── Webcam modal ──
function openCamModal(title, imgUrl, type, extUrl) {

    img.src = fresh;

}

document.getElementById("cam-close-btn").addEventListener("click", () => {

});
document.getElementById("cam-modal").addEventListener("click", e => {

// ─── Database picker ─────────────────────────────────────────────────────────
const dbBtn    = document.getElementById("db-btn");
const dbPicker = document.getElementById("db-picker");

dbBtn.addEventListener("click", () => {

document.addEventListener("click", e => {

// Reset location button — only shown on touch devices
document.getElementById("reset-loc-btn").addEventListener("click", () => {
  if (lastUserPos) {
    map.flyTo([lastUserPos.lat, lastUserPos.lng], 13, { duration: 1.2 });

// ─── Top-5 location labels ────────────────────────────────────────────────────
function nominatimZoom(z) {
  if (z >= 16) return 18;
  if (z >= 13) return 16;
  if (z >= 10) return 13;
  if (z >=  7) return 11;
  return 8;
}

function extractName(d, mapZoom) {
  const a = d.address || {};
  if (mapZoom >= 15) {
    return d.name || a.amenity || a.tourism || a.natural ||
           a.historic || a.leisure || a.man_made ||
           a.building || a.road || a.neighbourhood || a.suburb || "";
  }
  if (mapZoom >= 12) {
    return d.name || a.tourism || a.natural || a.leisure ||
           a.neighbourhood || a.suburb || a.village || a.town || "";
  }
  if (mapZoom >= 8) {
    return a.village || a.town || a.city_district || a.city || d.name || "";
  }
  return a.county || a.state || a.country || d.name || "";
}

async function geocode(lat, lng, mapZoom) {
  const nmZoom = nominatimZoom(mapZoom);
  const key    = `${lat.toFixed(3)},${lng.toFixed(3)},${nmZoom}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=${nmZoom}&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const name = extractName(d, mapZoom);
    geocodeCache.set(key, name);
    return name;
  } catch { return ""; }
}

// Reverse geocode for lightbox title (city/town at zoom 13)
async function reverseGeocodeCity(lat, lng) {
  const key = `city:${lat.toFixed(3)},${lng.toFixed(3)}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=13&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const a = d.address || {};
    const name = a.village || a.town || a.city_district || a.city || a.county || d.name || "";
    geocodeCache.set(key, name);
    return name;
  } catch { return ""; }
}

function scheduleLabels() {
  clearTimeout(labelTimer);
  labelTimer = setTimeout(updateLocationLabels, 800);
}

async function fadeOutLabels() {
  const els = document.querySelectorAll(".loc-label");
  if (!els.length) { labelLayer.clearLayers(); return; }
  els.forEach(el => el.classList.add("fading"));
  await sleep(320);
  labelLayer.clearLayers();
}

async function updateLocationLabels() {
  if (!showHeat || allPhotos.length === 0) {
    await fadeOutLabels(); return;
  }
  const gen    = ++labelGen;
  const zoom   = map.getZoom();
  const bounds = map.getBounds();
  const buf    = 0.02;

  const inView = allPhotos.filter(p =>
    p.lat >= bounds.getSouth()-buf && p.lat <= bounds.getNorth()+buf &&
    p.lng >= bounds.getWest()-buf  && p.lng <= bounds.getEast()+buf
  );
  if (!inView.length) { await fadeOutLabels(); return; }

  const CELL = Math.max(cellSize(zoom) * 0.5, 0.01);
  const grid  = new Map();
  for (const p of inView) {
    const key = `${Math.round(p.lat/CELL)},${Math.round(p.lng/CELL)}`;
    let g = grid.get(key);
    if (!g) { g = {lat:0,lng:0,views:0,n:0}; grid.set(key,g); }
    g.lat += p.lat; g.lng += p.lng; g.views += p.views; g.n++;
  }
  const top5 = Array.from(grid.values())
    .sort((a,b) => b.views - a.views)
    .slice(0, 2)
    .map(g => ({ lat:g.lat/g.n, lng:g.lng/g.n }));

  await fadeOutLabels();
  if (gen !== labelGen) return;

  for (let i = 0; i < top5.length; i++) {
    if (gen !== labelGen) return;
    const {lat, lng} = top5[i];
    // Use requestIdleCallback for geocoding to avoid blocking UI
    const name = await new Promise(resolve => {
      const cb = () => geocode(lat, lng, zoom).then(resolve);
      if (typeof requestIdleCallback === "function") requestIdleCallback(cb);
      else setTimeout(cb, 0);
    });
    if (gen !== labelGen) return;
    if (!name) continue;

    const icon = L.divIcon({
      className: "loc-icon",
      html: `<div class="loc-label">${escHtml(name)}</div>`,
      iconSize: [0,0], iconAnchor: [0,0],
    });
    L.marker([lat, lng], { icon, interactive:false, pane:"labelPane" })
      .addTo(labelLayer);

    if (i < top5.length - 1) await sleep(1100);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));


// ─── Slider: non-linear (0→50: all→30, 50→100: 30→1) ──────────────────────
const slider    = document.getElementById("engagement-slider");
const sliderLbl = document.getElementById("slider-value");

// Map slider position (0–100) to topN
function sliderPosToTopN(pos, maxN) {
  if (pos <= 50) {
    // 0 = all (maxN), 50 = 30
    const t = pos / 50; // 0→1
    return Math.round(maxN + t * (30 - maxN));
  } else {
    // 50 = 30, 100 = 1
    const t = (pos - 50) / 50; // 0→1
    return Math.round(30 + t * (1 - 30));
  }
}

// Map topN to slider position
function topNToSliderPos(n, maxN) {
  if (n >= maxN) return 0;
  if (n <= 1) return 100;
  if (n >= 30) {
    // between maxN and 30: pos 0→50
    return Math.round(50 * (maxN - n) / (maxN - 30));
  } else {
    // between 30 and 1: pos 50→100
    return Math.round(50 + 50 * (30 - n) / 29);
  }
}

function rescaleSlider() {
  const b = map.getBounds(), buf = 0.1;
  let n = 0;
  for (const p of allPhotos) {
    if (p.lat>=b.getSouth()-buf&&p.lat<=b.getNorth()+buf&&p.lng>=b.getWest()-buf&&p.lng<=b.getEast()+buf) n++;
  }
  const maxN = Math.max(n, 60);
  slider.dataset.maxN = maxN;
  if (!userMovedSlider) {
    topN = 30;
    slider.value = topNToSliderPos(30, maxN);
    sliderLbl.textContent = "Top 30";
  }
}

function applyTopNFromSlider(pos) {
  const maxN = parseInt(slider.dataset.maxN || "60");
  topN = Math.max(1, sliderPosToTopN(pos, maxN));
  sliderLbl.textContent = topN >= maxN ? "All" : `Top ${topN}`;
  userMovedSlider = true;
  lastRenderBoundsKey = ""; // force re-render
  clearTimeout(renderTimer);
  renderTimer = setTimeout(scheduleRender, 180);
}

function applyTopN(val) {
  const maxN = parseInt(slider.dataset.maxN || "60");
  topN = Math.max(1, Math.min(maxN, val));
  slider.value = topNToSliderPos(topN, maxN);
  sliderLbl.textContent = topN >= maxN ? "All" : `Top ${topN}`;
  userMovedSlider = true;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(scheduleRender, 180);
}

function sliderStep() {
  if (topN <= 10) return 1;
  if (topN <= 30) return 1;
  if (topN <= 100) return 5;
  if (topN <= 300) return 10;
  return 25;
}

slider.addEventListener("input", () => applyTopNFromSlider(parseInt(slider.value)));
document.getElementById("slider-minus").addEventListener("click", () => applyTopN(topN + sliderStep()));
document.getElementById("slider-plus").addEventListener("click",  () => applyTopN(topN - sliderStep()));
slider.dataset.maxN = "60";

// ─── Flickr API ───────────────────────────────────────────────────────────────
// ─── Data source ─────────────────────────────────────────────────────────────
let currentSource = "flickr"; // "flickr" | "wikimedia"

// ─── Wikimedia Commons fetch (quality-filtered) ───────────────────────────────
// Wikimedia caps geosearch at 10 000 m. We tile the visible area into
// CELL_KM-wide cells and fire one geosearch per cell (in parallel),
// caching which cells have already been fetched.
const WM_CELL_KM = 20;   // each cell is covered by a ~10 km radius search
const WM_RADIUS  = 9500; // metres — just under the 10 000 m cap
const wmFetchedKeys = new Set();

async function wikimediaFetchCell(lat, lng) {
  const geo = await fetch(`https://commons.wikimedia.org/w/api.php?${new URLSearchParams({
    action:'query', list:'geosearch', gscoord:`${lat}|${lng}`,
    gsradius: WM_RADIUS, gslimit: 50, format:'json', origin:'*', gsnamespace:6
  })}`).then(r => r.json());
  const hits = geo.query?.geosearch || [];
  if (!hits.length) return [];

  const geoMap = {};
  hits.forEach(h => { geoMap[h.title] = { lat: h.lat, lng: h.lon }; });

  const info = await fetch(`https://commons.wikimedia.org/w/api.php?${new URLSearchParams({
    action:'query', titles: hits.map(h => h.title).join('|'),
    prop:'imageinfo|pageviews', iiprop:'url|size|timestamp', iiurlwidth:'300',
    pvipdays: 30, format:'json', origin:'*'
  })}`).then(r => r.json());

  const results = [];
  for (const page of Object.values(info.query?.pages || {})) {
    const ii = page.imageinfo?.[0];
    if (!ii) continue;
    if ((ii.width  || 0) < 1500)   continue;  // quality: min 1500 px wide
    if ((ii.size   || 0) < 200000) continue;  // quality: min 200 KB
    if (!ii.url?.match(/\.(jpe?g)$/i)) continue;
    const geo = geoMap[page.title];
    if (!geo) continue;
    const pageViews = Object.values(page.pageviews || {}).reduce((s, v) => s + (v || 0), 0);
    const views = pageViews || Math.round((ii.width||0) * (ii.height||0) / 1e6);
    const clean = page.title.replace(/^File:/,'').replace(/\.[^.]+$/,'').replace(/_/g,' ');
    results.push({
      id: `wm_${page.pageid}`, title: clean,
      lat: geo.lat, lng: geo.lng,
      thumb:  ii.thumburl || ii.url,
      medium: ii.url, large: ii.url,
      owner: 'commons', views,
      url: `https://commons.wikimedia.org/wiki/${encodeURIComponent(page.title)}`
    });
  }
  return results;
}

async function wikimediaIngestBounds(bounds) {
  const S = bounds.getSouth(), N = bounds.getNorth();
  const W = bounds.getWest(),  E = bounds.getEast();
  const latKm = (N - S) * 111;
  const lngKm = (E - W) * 111 * Math.cos(((N+S)/2) * Math.PI / 180);

  // Divide visible area into grid cells
  const latCells = Math.max(1, Math.ceil(latKm / WM_CELL_KM));
  const lngCells = Math.max(1, Math.ceil(lngKm / WM_CELL_KM));

  // Too zoomed out → too many cells, skip gracefully
  const total = latCells * lngCells;
  if (total > 9) return;

  // Collect uncached cell centers
  const pending = [];
  for (let i = 0; i < latCells; i++) {
    for (let j = 0; j < lngCells; j++) {
      const lat = S + (N - S) * (i + 0.5) / latCells;
      const lng = W + (E - W) * (j + 0.5) / lngCells;
      const key = `${lat.toFixed(2)},${lng.toFixed(2)}`;
      if (wmFetchedKeys.has(key)) continue;
      wmFetchedKeys.add(key);
      pending.push([lat, lng]);
    }
  }
  if (!pending.length) return;

  try {
    const batches = await Promise.all(pending.map(([lat, lng]) => wikimediaFetchCell(lat, lng)));
    let added = 0;
    for (const photos of batches) {
      for (const ph of photos) {
        if (photoById.has(ph.id) || !ph.thumb) continue;
        allPhotos.push(ph); photoById.set(ph.id, ph); added++;
      }
    }
    if (added > 0) { scheduleHeatmap(); rescaleSlider(); scheduleRender(); }
  } catch(e) { console.warn("Wikimedia:", e); }
}

// ─── Flickr fetch ─────────────────────────────────────────────────────────────
async function flickrFetch(extra) {
  const p = new URLSearchParams({
    method:"flickr.photos.search", api_key:CONFIG.FLICKR_API_KEY,
    has_geo:1, extras:"geo,url_sq,url_m,url_l,owner_name,views,title,accuracy",
    sort:"interestingness-desc", per_page:250,
    format:"json", nojsoncallback:1, content_type:1, media:"photos",
    ...(currentTag ? {tags:currentTag,tag_mode:"any"} : {}),
    ...extra,
  });
  // Try api.flickr.com first (less likely to be blocked by content filters)
  let r;
  try {
    r = await fetch(`https://api.flickr.com/services/rest/?${p}`, { mode: 'cors', cache: 'no-store' });
  } catch {
    r = await fetch(`https://www.flickr.com/services/rest/?${p}`, { mode: 'cors', cache: 'no-store' });
  }
  if (!r.ok) throw new Error("Flickr HTTP " + r.status);
  const d = await r.json();
  if (d.stat !== "ok") throw new Error(d.message || "Flickr error");
  return d.photos;
}

function ingestPhoto(ph) {
  if (photoById.has(ph.id) || !isGoodPhoto(ph)) return false;
  const lat = parseFloat(ph.latitude), lng = parseFloat(ph.longitude);
  if (!lat && !lng) return false;
  const obj = { id:ph.id, title:ph.title||"Untitled", lat, lng,
    thumb:ph.url_sq, medium:ph.url_m, large:ph.url_l,
    owner:ph.owner, views:parseInt(ph.views)||0,
    url:`https://www.flickr.com/photos/${ph.owner}/${ph.id}` };
  allPhotos.push(obj); photoById.set(ph.id, obj);
  return true;
}

// ─── Fetch a bounding box ─────────────────────────────────────────────────────
function boxKey(bounds) {
  return `${bounds.getSouth().toFixed(2)},${bounds.getNorth().toFixed(2)},${bounds.getWest().toFixed(2)},${bounds.getEast().toFixed(2)}|${currentTag}`;
}

async function fetchBox(bounds, pages=3) {
  if (map.getZoom() < MIN_FETCH_ZOOM) return;
  const key = boxKey(bounds);
  if (fetchedKeys.has(key)) return;
  fetchedKeys.add(key);

  const w=Math.max(bounds.getWest(),-180), e=Math.min(bounds.getEast(),180);
  const s=Math.max(bounds.getSouth(),-90), n=Math.min(bounds.getNorth(),90);
  if (s>=n || w>=e) return;
  const bbox=`${w.toFixed(4)},${s.toFixed(4)},${e.toFixed(4)},${n.toFixed(4)}`;

  let added = 0;
  try {
    for (let p=1; p<=pages; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) if (ingestPhoto(ph)) added++;
      if (p >= pg.pages) break;
    }
    if (added > 0) {
      scheduleHeatmap(); rescaleSlider(); scheduleRender();
      document.getElementById("count-badge") && (document.getElementById("count-badge").textContent = `${allPhotos.length} spots`);
    }
  } catch(e) { console.warn("fetchBox:", e.message); }
}

// Silently preload surrounding 5×5 grid (Flickr only — Wikimedia uses its own tiling)
function preloadSurrounding() {
  if (currentSource !== "flickr") return;
  if (map.getZoom() < MIN_FETCH_ZOOM + 2) return;
  const b = map.getBounds();
  const W = b.getEast()-b.getWest(), H = b.getNorth()-b.getSouth();
  for (let dx=-2; dx<=2; dx++) for (let dy=-2; dy<=2; dy++) {
    if (!dx && !dy) continue;
    const nb = L.latLngBounds(
      [b.getSouth()+dy*H, b.getWest()+dx*W],
      [b.getNorth()+dy*H, b.getEast()+dx*W]
    );
    fetchBox(nb, 2);
  }
}

// ─── Initial area load ────────────────────────────────────────────────────────
async function loadArea() {
  const status = document.getElementById("status");
  status.innerHTML = `<span class="loader"></span>Loading…`;
  clearAll(); clusterLayer.addTo(map);

  if (currentSource === "wikimedia") {
    try {
      await wikimediaIngestBounds(map.getBounds());
      buildHeatmap(); rescaleSlider(); renderClusters(); scheduleRender();
      status.textContent = `${allPhotos.length} spots`;
    } catch(err) { status.textContent = `⚠ ${err.message}`; }
    return;
  }

  try {
    const b = map.getBounds();
    const bbox = `${Math.max(b.getWest(),-180).toFixed(4)},${Math.max(b.getSouth(),-90).toFixed(4)},${Math.min(b.getEast(),180).toFixed(4)},${Math.min(b.getNorth(),90).toFixed(4)}`;
    for (let p=1; p<=4; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) ingestPhoto(ph);
      if (p===1) {
        buildHeatmap(); rescaleSlider();
        renderClusters(); scheduleRender();
      } else {
        scheduleHeatmap();
      }
      status.textContent = `${allPhotos.length} spots`;
      if (p >= pg.pages) break;
    }
    rescaleSlider(); scheduleRender();
    status.textContent = "";
    preloadSurrounding();
  } catch(err) {
    const isNetwork = err.message.toLowerCase().includes("load") || err.message.toLowerCase().includes("network") || err.message.toLowerCase().includes("fetch");
    if (isNetwork) {
      status.innerHTML = `⚠ Network blocked — try disabling content blockers for this site, then <a href="javascript:loadArea()" style="color:#7aadff">tap to retry</a>`;
    } else {
      status.textContent = `⚠ ${err.message}`;
    }
  }
}

async function doLocSearch(q) {
  if (!q) { locResultsEl.classList.remove("open"); return; }
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`, {
      headers: { "Accept-Language": "en" }
    });
    const results = await r.json();
    if (!results.length) {
      locResultsEl.innerHTML = `<div class="loc-result-item"><span class="loc-result-name">No results</span></div>`;
      locResultsEl.classList.add("open");
      return;
    }
    locResultsEl.innerHTML = results.map((res, i) => {
      const parts = res.display_name.split(",");
      const name = parts[0].trim();
      const detail = parts.slice(1, 3).join(",").trim();
      return `<div class="loc-result-item" data-idx="${i}" data-lat="${res.lat}" data-lon="${res.lon}" data-bb='${JSON.stringify(res.boundingbox)}'>
        <div class="loc-result-name">${escHtml(name)}</div>
        <div class="loc-result-detail">${escHtml(detail)}</div>
      </div>`;
    }).join("");
    locResultsEl.classList.add("open");
    locResultsEl.querySelectorAll(".loc-result-item[data-lat]").forEach(el => {
      el.addEventListener("click", () => {
        const lat = parseFloat(el.dataset.lat);
        const lon = parseFloat(el.dataset.lon);
        const bb = JSON.parse(el.dataset.bb); // [south,north,west,east]
        locResultsEl.classList.remove("open");
        locSearchInput.value = el.querySelector(".loc-result-name").textContent;
        if (bb && bb.length === 4) {
          map.fitBounds([[parseFloat(bb[0]),parseFloat(bb[2])],[parseFloat(bb[1]),parseFloat(bb[3])]]);
        } else {
          map.flyTo([lat, lon], 10, {duration: 1.2});
        }
        setTimeout(() => loadArea(), 800);
      });
    });
  } catch(e) { console.warn("loc search:", e); }
}

const navPanel = document.getElementById("nav-panel");

function fmtDuration(secs) {
  const m = Math.round(secs / 60);
  return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}m`;
}

async function navigateTo(ph) {
  closeLightbox();
  document.getElementById("nav-dest-name").textContent = ph.title;
  document.getElementById("nav-details").textContent = lastUserPos ? "Calculating…" : "Location unavailable";
  navPanel.classList.add("active");
  if (!lastUserPos) return;

  const {lat:uLat,lng:uLng} = lastUserPos;
  const coord = `${uLng},${uLat};${ph.lng},${ph.lat}`;
  try {
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coord}?overview=full&geometries=geojson`);
    const d = await r.json();
    if (d.code !== "Ok") throw new Error();
    const route = d.routes[0];
    const coords = route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(coords,{color:"#4d7fff",weight:5,opacity:0.88}).addTo(map);
    map.fitBounds(routeLayer.getBounds(),{paddingTopLeft:[20,80],paddingBottomRight:[20,120]});
    const km = (route.distance/1000).toFixed(1);
    const carTime  = fmtDuration(route.duration);
    const walkSecs = (route.distance / 1000) / 5 * 3600;
    const footTime = fmtDuration(walkSecs);
    document.getElementById("nav-details").innerHTML =
      `${km} km<br>🚗 ${carTime}<br>🥾 ${footTime}`;
  } catch { document.getElementById("nav-details").textContent = "Route unavailable."; }
}

// ─── Weather helpers ──────────────────────────────────────────────────────────
const WX_ICON = c => {
  if (c === 0) return "☀️";
  if (c <= 3)  return "🌤";
  if (c <= 48) return "🌫";
  if (c <= 55) return "🌦";
  if (c <= 65) return "🌧";
  if (c <= 77) return "❄️";
  if (c <= 82) return "🌦";
  return "⛈";
};

function fmtTime(isoOrDate) {
  const d = isoOrDate instanceof Date ? isoOrDate : new Date(isoOrDate);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDay(iso) {
  return new Date(iso).toLocaleDateString([], { weekday: "short" });
}

function addMinutes(isoOrDate, mins) {
  const d = isoOrDate instanceof Date ? new Date(isoOrDate) : new Date(isoOrDate);
  d.setMinutes(d.getMinutes() + mins);
  return d;
}

// ─── Moon phase ───────────────────────────────────────────────────────────────
function estimateTides(lng) {
  const now = new Date();
  const refNewMoon = new Date('2024-01-11T11:57Z');
  const lunarPeriod = 29.53058867 * 24 * 60 * 60 * 1000;
  const tidalPeriod = 745; // minutes — semi-diurnal (12h 25min)
  const lunarAge = ((now - refNewMoon) % lunarPeriod) / lunarPeriod * 29.53;
  const midnight = new Date(now); midnight.setHours(0,0,0,0);
  const lonOffset = lng / 15 * 60;
  const lunarDelay = (lunarAge * 50) % (tidalPeriod * 2);
  const firstHigh = (720 + lonOffset + lunarDelay) % (tidalPeriod * 2);
  const tides = [];
  const dayMs = 24*60*60*1000;
  for (let i = -2; i < 6; i++) {
    const h = new Date(midnight.getTime() + (firstHigh + i * tidalPeriod) * 60000);
    const l = new Date(h.getTime() + tidalPeriod / 2 * 60000);
    if (h >= midnight && h < new Date(midnight.getTime() + dayMs)) tides.push({type:'high', time:h});
    if (l >= midnight && l < new Date(midnight.getTime() + dayMs)) tides.push({type:'low',  time:l});
  }
  return tides.sort((a,b) => a.time - b.time).slice(0,4);
}

function moonPhase() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth()+1, day = now.getDate();
  let jd = 367*year - Math.floor(7*(year+Math.floor((month+9)/12))/4) + Math.floor(275*month/9) + day + 1721013.5;
  const cycle = (jd - 2451550.1) / 29.53058867;
  const phase = cycle - Math.floor(cycle);
  const pct = Math.round(phase <= 0.5 ? phase*200 : (1-phase)*200);
  const emojis = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘','🌑'];
  const emoji = emojis[Math.round(phase * 8) % 9];
  return { emoji, pct, phase };
}

// ─── Aurora fetch ─────────────────────────────────────────────────────────────
async function fetchAurora() {
  try {
    const r = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
    const d = await r.json();
    if (!d || !d.length) return null;
    const kp = d[d.length - 1].kp_index;
    let label;
    if (kp < 2)      label = "None expected";
    else if (kp < 4) label = "Weak possibility";
    else if (kp < 6) label = "Moderate (visible in Norway!)";
    else             label = "Strong aurora expected!";
    return { kp, label };
  } catch { return null; }
}

// ─── Weather loader ───────────────────────────────────────────────────────────
async function loadWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&hourly=temperature_2m,weather_code&daily=sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min` +
    `&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    fullWeatherData = d;

    // Sun times
    const riseDate = new Date(d.daily.sunrise[0]);
    const setDate  = new Date(d.daily.sunset[0]);

    const blueRiseStart = addMinutes(riseDate, -30);
    const blueRiseEnd   = riseDate;
    const goldenRiseStart = riseDate;
    const goldenRiseEnd   = addMinutes(riseDate, 60);
    const goldenSetStart  = addMinutes(setDate, -60);
    const goldenSetEnd    = setDate;
    const blueSetStart    = setDate;
    const blueSetEnd      = addMinutes(setDate, 30);

    const moon = moonPhase();
    const tides = estimateTides(lng);
    const highTimes = tides.filter(t => t.type==='high').map(t => fmtTime(t.time)).join(' · ');
    const lowTimes  = tides.filter(t => t.type==='low').map(t => fmtTime(t.time)).join(' · ');
    const tideHtml = `
      ${highTimes ? `<div class="lb-sun-row"><span class="sr-label">🌊 High Tide</span><span class="sr-val">${highTimes}</span></div>` : ''}
      ${lowTimes  ? `<div class="lb-sun-row"><span class="sr-label">🏖 Low Tide</span><span class="sr-val">${lowTimes}</span></div>`  : ''}
    `;

    // Aurora (async, non-blocking)
    const auroraPromise = fetchAurora();

    const sunHtml = `
      <div class="lb-sun-row"><span class="sr-label">🌅 Sunrise</span><span class="sr-val">${fmtTime(riseDate)}</span></div>
      <div class="lb-sun-row blue"><span class="sr-label">🌫 Blue Hour (dawn)</span><span class="sr-val">${fmtTime(blueRiseStart)} – ${fmtTime(blueRiseEnd)}</span></div>
      <div class="lb-sun-row golden"><span class="sr-label">🌄 Golden Hour (am)</span><span class="sr-val">${fmtTime(goldenRiseStart)} – ${fmtTime(goldenRiseEnd)}</span></div>
      <div class="lb-sun-divider"></div>
      <div class="lb-sun-row"><span class="sr-label">🌇 Sunset</span><span class="sr-val">${fmtTime(setDate)}</span></div>
      <div class="lb-sun-row golden"><span class="sr-label">🌄 Golden Hour (pm)</span><span class="sr-val">${fmtTime(goldenSetStart)} – ${fmtTime(goldenSetEnd)}</span></div>
      <div class="lb-sun-row blue"><span class="sr-label">🌫 Blue Hour (dusk)</span><span class="sr-val">${fmtTime(blueSetStart)} – ${fmtTime(blueSetEnd)}</span></div>
      <div class="lb-sun-divider"></div>
      <div class="lb-sun-row"><span class="sr-label">${moon.emoji} Moon</span><span class="sr-val">${moon.pct}% illuminated</span></div>
      <div class="lb-sun-row" id="lb-aurora-row"><span class="sr-label">🌌 Aurora</span><span class="sr-val" id="lb-aurora-val">Loading…</span></div>
      <div class="lb-sun-divider"></div>
      ${tideHtml}
    `;
    document.getElementById("lb-sun").innerHTML = sunHtml;

    // Fill aurora once it resolves
    auroraPromise.then(aurora => {
      const el = document.getElementById("lb-aurora-val");
      if (el) el.textContent = aurora
        ? `${aurora.label} · Kp ${aurora.kp.toFixed(1)} (${Math.round(aurora.kp/9*100)}%)`
        : "Unavailable";
    });

    // Next 24 h hourly
    const now = new Date();
    const nowH = now.getFullYear()*1e6 + (now.getMonth()+1)*1e4 + now.getDate()*100 + now.getHours();
    const items = [];
    for (let i = 0; i < d.hourly.time.length && items.length < 16; i++) {
      const t = new Date(d.hourly.time[i]);
      const tH = t.getFullYear()*1e6 + (t.getMonth()+1)*1e4 + t.getDate()*100 + t.getHours();
      if (tH < nowH) continue;
      const label = items.length === 0 ? "Now" : t.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      items.push(`<div class="lb-h-item">
        <span class="lb-h-time">${label}</span>
        <span class="lb-h-icon">${WX_ICON(d.hourly.weather_code[i])}</span>
        <span class="lb-h-temp">${Math.round(d.hourly.temperature_2m[i])}°</span>
      </div>`);
    }
    document.getElementById("lb-hourly").innerHTML = items.join("");

    // Weekly forecast (clickable days show hourly)
    const weeklyEl = document.getElementById("lb-weekly");
    weeklyEl.innerHTML = d.daily.time.map((t, dayIdx) => {
      return `<div class="lb-d-item" data-day="${dayIdx}">
        <span class="lb-d-day">${dayIdx===0?"Today":fmtDay(t)}</span>
        <span class="lb-d-icon">${WX_ICON(d.daily.weather_code[dayIdx])}</span>
        <span class="lb-d-range">${Math.round(d.daily.temperature_2m_min[dayIdx])}° – ${Math.round(d.daily.temperature_2m_max[dayIdx])}°</span>
      </div>
      <div class="lb-d-hourly" id="lb-day-${dayIdx}">
        <div class="lb-d-hourly-inner">${buildDayHourly(d, t)}</div>
      </div>`;
    }).join("");

    weeklyEl.querySelectorAll(".lb-d-item").forEach(el => {
      el.addEventListener("click", () => {
        const dayIdx = el.dataset.day;
        const hourlyEl = document.getElementById(`lb-day-${dayIdx}`);
        const isOpen = hourlyEl.classList.toggle("open");
        el.classList.toggle("expanded", isOpen);
        // Close others
        weeklyEl.querySelectorAll(".lb-d-hourly.open").forEach(h => {
          if (h.id !== `lb-day-${dayIdx}`) { h.classList.remove("open"); }
        });
        weeklyEl.querySelectorAll(".lb-d-item.expanded").forEach(other => {
          if (other !== el) other.classList.remove("expanded");
        });
      });
    });
  } catch {
    document.getElementById("lb-sun").innerHTML = `<div class="lb-sun-row"><span class="sr-label">Weather unavailable</span></div>`;
  }
}

function buildDayHourly(d, dateStr) {
  const prefix = dateStr.substring(0, 10);
  const items = [];
  for (let i = 0; i < d.hourly.time.length; i++) {
    if (!d.hourly.time[i].startsWith(prefix)) continue;
    const t = new Date(d.hourly.time[i]);
    if (t.getHours() % 3 !== 0) continue;
    items.push(`<div class="lb-h-item">
      <span class="lb-h-time">${t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
      <span class="lb-h-icon">${WX_ICON(d.hourly.weather_code[i])}</span>
      <span class="lb-h-temp">${Math.round(d.hourly.temperature_2m[i])}°</span>
    </div>`);
  }
  return items.join("");
}

// ─── Save locations (localStorage) ───────────────────────────────────────────
function getSaved() {
  try { return JSON.parse(localStorage.getItem("cinepinSaved") || "[]"); } catch { return []; }
}
function setSaved(arr) { localStorage.setItem("cinepinSaved", JSON.stringify(arr)); }
function getFolders() {
  try { return JSON.parse(localStorage.getItem("cinepinFolders") || '[{"name":"Saved","ids":[]}]'); } catch { return [{"name":"Saved","ids":[]}]; }
}
function setFolders(arr) { localStorage.setItem("cinepinFolders", JSON.stringify(arr)); }

function isSaved(id) { return getSaved().some(s => s.id === id); }

function toggleSave(ph) {
  let saved = getSaved();
  if (saved.some(s => s.id === ph.id)) {
    saved = saved.filter(s => s.id !== ph.id);
    // Remove from all folders
    const folders = getFolders();
    folders.forEach(f => { f.ids = f.ids.filter(id => id !== ph.id); });
    setFolders(folders);
  } else {
    saved.push({ id: ph.id, title: ph.title, lat: ph.lat, lng: ph.lng, thumb: ph.thumb });
    // Add to default folder
    const folders = getFolders();
    if (!folders.length) folders.push({ name: "Saved", ids: [] });
    if (!folders[0].ids.includes(ph.id)) folders[0].ids.push(ph.id);
    setFolders(folders);
  }
  setSaved(saved);
  updateSaveBtn(ph.id);
}

function updateSaveBtn(id) {
  const btn = document.getElementById("lb-save");
  if (!btn) return;
  if (isSaved(id)) {
    btn.textContent = "★ Saved";
    btn.classList.add("saved");
  } else {
    btn.textContent = "⭐ Save Location";
    btn.classList.remove("saved");
  }
}

function getOrCreateDefaultFolder() {
  const folders = getFolders();
  let idx = folders.findIndex(f => f.name === "My Locations");
  if (idx === -1) { folders.push({ name: "My Locations", ids: [] }); setFolders(folders); idx = folders.length - 1; }
  return idx;
}

function saveToFolder(ph, folderIdx) {
  let saved = getSaved();
  // Remove from all folders first
  const folders = getFolders();
  folders.forEach(f => { f.ids = f.ids.filter(id => id !== ph.id); });
  if (!saved.some(s => s.id === ph.id)) {
    saved.push({ id:ph.id, title:ph.title, lat:ph.lat, lng:ph.lng, thumb:ph.thumb });
  }
  setSaved(saved);
  if (!folders[folderIdx].ids.includes(ph.id)) folders[folderIdx].ids.push(ph.id);
  setFolders(folders);
  updateSaveBtn(ph.id);
  updateFolderHint(ph.id);
  document.getElementById("lb-folder-picker").classList.remove("open");
}

function renderFolderPicker(currentPhId) {
  const folders = getFolders();
  const activeFolderIdx = folders.findIndex(f => f.ids.includes(currentPhId));
  const container = document.getElementById("lb-fp-folders");
  container.innerHTML = folders.map((f,i) =>
    `<button class="lb-fp-folder${i===activeFolderIdx?' active':''}" data-idx="${i}">📁 ${escHtml(f.name)}</button>`
  ).join("");
  container.querySelectorAll(".lb-fp-folder").forEach(btn => {
    btn.addEventListener("click", () => saveToFolder(currentLbPhoto, parseInt(btn.dataset.idx)));
  });
}

function updateFolderHint(id) {
  const hint = document.getElementById("lb-folder-hint");
  const folders = getFolders();
  const folder = folders.find(f => f.ids.includes(id));
  if (isSaved(id) && folder) {
    hint.textContent = `📁 ${folder.name} — Move to another folder ▾`;
    hint.classList.add("visible");
  } else {
    hint.textContent = "";
    hint.classList.remove("visible");
  }
}

document.getElementById("lb-folder-hint").addEventListener("click", () => {
  const picker = document.getElementById("lb-folder-picker");
  picker.classList.toggle("open");
  if (picker.classList.contains("open") && currentLbPhoto) renderFolderPicker(currentLbPhoto.id);
});

document.getElementById("lb-save").addEventListener("click", () => {
  if (!currentLbPhoto) return;
  if (isSaved(currentLbPhoto.id)) {
    // Unsave
    let saved = getSaved();
    saved = saved.filter(s => s.id !== currentLbPhoto.id);
    const folders = getFolders();
    folders.forEach(f => { f.ids = f.ids.filter(id => id !== currentLbPhoto.id); });
    setSaved(saved); setFolders(folders);
    updateSaveBtn(currentLbPhoto.id);
    updateFolderHint(currentLbPhoto.id);
    document.getElementById("lb-folder-picker").classList.remove("open");
  } else {
    // Save immediately to "My Locations"
    saveToFolder(currentLbPhoto, getOrCreateDefaultFolder());
  }
});

document.getElementById("lb-fp-create").addEventListener("click", () => {
  const input = document.getElementById("lb-fp-input");
  const name = input.value.trim();
  if (!name || !currentLbPhoto) return;
  const folders = getFolders();
  folders.push({ name, ids: [] });
  setFolders(folders);
  saveToFolder(currentLbPhoto, folders.length - 1);
  input.value = "";
});

  renderMyLocations();

}
function closeMyLocations() {
  document.getElementById("my-locations-modal").classList.remove("open");
}

function renderMyLocations() {
  const folders = getFolders();
  const saved = getSaved();
  const savedMap = new Map(saved.map(s => [s.id, s]));
  const foldersEl = document.getElementById("ml-folders");

  if (!saved.length) {
    foldersEl.innerHTML = `<div class="ml-empty">No saved locations yet.<br>Open a photo and tap ⭐ Save Location.</div>`;
    return;
  }

  foldersEl.innerHTML = folders.map((folder, fi) => {
    const items = folder.ids.map(id => savedMap.get(id)).filter(Boolean);
    if (!items.length) return "";
    const itemsHtml = items.map(ph => `
      <div class="ml-item" data-id="${escHtml(ph.id)}">
        <img src="${escHtml(ph.thumb)}" alt="" loading="lazy" />
        <div class="ml-item-name">${escHtml(ph.title)}</div>
      </div>
    `).join("");
    return `<div class="ml-folder">
      <div class="ml-folder-header">${escHtml(folder.name)}</div>
      <div class="ml-grid">${itemsHtml}</div>
    </div>`;
  }).join("");

  foldersEl.querySelectorAll(".ml-item").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.id;
      const ph = savedMap.get(id);
      if (!ph) return;
      closeMyLocations();
      // Try to find in allPhotos for full object, else use saved data
      const full = photoById.get(id) || ph;
      openLightbox(full);
    });
  });
}

  (async () => {

      if (cached) { el.textContent = cached; continue; }

      const name = await reverseGeocodeCity(ph.lat, ph.lng).catch(() => null);
      if (el && name) el.textContent = name;
    }
  })();
}

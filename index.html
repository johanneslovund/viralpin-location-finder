// ─── Lightbox ────────────────────────────────────────────────────────────────
function buildGallery(ph) {
  const DELTA = 0.05;
  galleryPhotos = allPhotos
    .filter(p => Math.abs(p.lat - ph.lat) <= DELTA && Math.abs(p.lng - ph.lng) <= DELTA)
    .sort((a, b) => b.views - a.views);
  galleryIndex = galleryPhotos.findIndex(p => p.id === ph.id);
  if (galleryIndex < 0) { galleryPhotos = [ph]; galleryIndex = 0; }
}

function updateGalleryUI() {
  const navEl   = document.getElementById("lb-gallery-nav");
  const countEl = document.getElementById("lb-gallery-count");
  if (galleryPhotos.length > 1) {
    navEl.classList.add("visible");
    countEl.classList.add("visible");
    countEl.textContent = `${galleryIndex + 1} / ${galleryPhotos.length}`;
  } else {
    navEl.classList.remove("visible");
    countEl.classList.remove("visible");
  }
}

function addToHistory(ph) {
  try {
    let hist = JSON.parse(localStorage.getItem("cinepinHistory") || "[]");
    hist = hist.filter(h => h.id !== ph.id);
    hist.unshift({ id:ph.id, title:ph.title, lat:ph.lat, lng:ph.lng, thumb:ph.thumb });
    hist = hist.slice(0, 10);
    localStorage.setItem("cinepinHistory", JSON.stringify(hist));
  } catch {}
}

function openLightbox(ph) {
  currentLbPhoto = ph;
  addToHistory(ph);
  buildGallery(ph);
  document.getElementById("lightbox-img").src = ph.large||ph.medium||ph.thumb;
  document.getElementById("lightbox-title").textContent = ph.title;
  document.getElementById("lb-gmaps").href = `https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}`;
  document.getElementById("lb-apmaps").href = `https://maps.apple.com/?ll=${ph.lat},${ph.lng}&q=${encodeURIComponent(ph.title)}`;
  document.getElementById("lb-streetview").href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${ph.lat},${ph.lng}`;
  document.getElementById("lb-sun").innerHTML = `<div class="lb-sun-row"><span class="sr-label">Loading weather…</span></div>`;
  document.getElementById("lb-hourly").innerHTML = "";
  document.getElementById("lb-weekly").classList.remove("open");
  document.getElementById("lb-forecast-toggle").textContent = "Weekly forecast ↓";
  document.getElementById("lb-meta").innerHTML = "";
  document.getElementById("lb-folder-picker").classList.remove("open");
  document.getElementById("lb-folder-hint").classList.remove("visible");
  updateFolderHint(ph.id);
  document.getElementById("lightbox").classList.add("open");
  updateSaveBtn(ph.id);
  updateGalleryUI();
  loadWeather(ph.lat, ph.lng);
  // Async title update with city name
  reverseGeocodeCity(ph.lat, ph.lng).then(city => {
    if (currentLbPhoto && currentLbPhoto.id === ph.id && city) {
      document.getElementById("lightbox-title").textContent = `${ph.title} — ${city}`;
    }
  });
  // Fetch EXIF (camera, lens, date)
  fetchExif(ph.id, ph.owner);
}

async function fetchExif(photoId, owner) {
  try {
    const p = new URLSearchParams({ method:"flickr.photos.getExif", api_key:CONFIG.FLICKR_API_KEY, photo_id:photoId, format:"json", nojsoncallback:1 });
    const r = await fetch(`https://api.flickr.com/services/rest/?${p}`);
    const d = await r.json();
    if (d.stat !== "ok" || !d.photo) return;
    const exif = d.photo.exif || [];
    const get = (...tags) => { for (const tag of tags) { const e = exif.find(x => x.tag === tag); if (e) return e.raw._content; } return null; };
    const date   = get("DateTimeOriginal","DateTime");
    const camera = [get("Make"), get("Model")].filter(Boolean).join(" ");
    const lens   = get("LensModel","Lens","LensInfo");
    const meta   = document.getElementById("lb-meta");
    if (!meta || currentLbPhoto?.id !== photoId) return;
    const parts = [];
    if (date)   parts.push(`📅 ${date.replace(":","-").replace(":","-").replace(" ","  ")}`);
    if (camera) parts.push(`📷 ${camera}`);
    if (lens)   parts.push(`🔭 ${lens}`);
    meta.innerHTML = parts.map(p => `<span>${escHtml(p)}</span>`).join("");
  } catch {}
}

function navigateGallery(dir) {
  const next = galleryIndex + dir;
  if (next < 0 || next >= galleryPhotos.length) return;
  galleryIndex = next;
  const ph = galleryPhotos[galleryIndex];
  currentLbPhoto = ph;
  document.getElementById("lightbox-img").src = ph.large||ph.medium||ph.thumb;
  document.getElementById("lightbox-title").textContent = ph.title;
  document.getElementById("lb-gmaps").href = `https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}`;
  document.getElementById("lb-apmaps").href = `https://maps.apple.com/?ll=${ph.lat},${ph.lng}&q=${encodeURIComponent(ph.title)}`;
  document.getElementById("lb-streetview").href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${ph.lat},${ph.lng}`;
  updateSaveBtn(ph.id);
  updateGalleryUI();
  reverseGeocodeCity(ph.lat, ph.lng).then(city => {
    if (currentLbPhoto && currentLbPhoto.id === ph.id && city) {
      document.getElementById("lightbox-title").textContent = `${ph.title} — ${city}`;
    }
  });
}

document.getElementById("lb-prev").addEventListener("click", () => navigateGallery(-1));
document.getElementById("lb-next").addEventListener("click", () => navigateGallery(1));

// Swipe detection on lightbox image (left/right = gallery, up/down = close)
(function() {
  const lbImg = document.getElementById("lightbox-img");
  const lb = document.getElementById("lightbox");
  let sx = 0, sy = 0;
  lbImg.addEventListener("touchstart", e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
  }, { passive: true });
  lbImg.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      navigateGallery(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // Swipe-to-close removed — lightbox is scrollable so vertical swipes mean scroll, not dismiss
})();

document.getElementById("lb-navigate").addEventListener("click",()=>{ if(currentLbPhoto) navigateTo(currentLbPhoto); });
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLightbox();
  if (document.getElementById("lightbox").classList.contains("open")) {
    if (e.key === "ArrowLeft") navigateGallery(-1);
    if (e.key === "ArrowRight") navigateGallery(1);
  }
});

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
  currentLbPhoto = null;
}

// ─── Live location ────────────────────────────────────────────────────────────
let locMarker=null, locCircle=null, hasPanned=false;
const locIcon=L.divIcon({className:"",html:`<div class="user-dot"><div class="ring"></div><div class="dot"></div></div>`,iconSize:[18,18],iconAnchor:[9,9]});
if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy}=pos.coords;
    lastUserPos={lat,lng};
    if (!hasPanned) { hasPanned=true; map.flyTo([lat,lng],13,{duration:2}); }
    if (!locMarker) {
      locMarker=L.marker([lat,lng],{icon:locIcon,zIndexOffset:2000}).addTo(map).bindTooltip("You are here",{direction:"top"});
      locCircle=L.circle([lat,lng],{radius:accuracy,color:"#4d9fff",fillColor:"#4d9fff",fillOpacity:0.07,weight:1,opacity:0.35}).addTo(map);
    } else { locMarker.setLatLng([lat,lng]); locCircle.setLatLng([lat,lng]).setRadius(accuracy); }
  },err=>console.warn("GPS:",err.message),{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ─── Block map interaction behind bottom UI ───────────────────────────────────
const bottomContainer = document.getElementById("bottom-container");
L.DomEvent.disableScrollPropagation(bottomContainer);
L.DomEvent.disableClickPropagation(bottomContainer);
bottomContainer.addEventListener("touchstart", e => e.stopPropagation(), { passive: true });
bottomContainer.addEventListener("touchmove",  e => e.stopPropagation(), { passive: true });

// Block loc search from map interactions
const locSearchWrap = document.getElementById("loc-search-wrap");
L.DomEvent.disableScrollPropagation(locSearchWrap);
L.DomEvent.disableClickPropagation(locSearchWrap);

// ─── Intro animation ──────────────────────────────────────────────────────────
// Timeline:
//  t=0–4s  : dark bg + logo + spinner — static hold
//  t=4–7s  : background fades (3s), logo stays on globe, zoom starts
//  t=~14s  : flyTo ends (moveend) → logo fades over 3s
//  t=~17s  : everything done

hasPanned = true; // block GPS watchPosition during intro

// At t=4s: bg starts fading (same moment as zoom)
setTimeout(() => {
  document.getElementById("loading-bg").classList.add("fade-out");
}, 4000);

// GPS prefetch — fetch photos for user location as soon as signal arrives,
// even while the animation is still running
async function prefetchForLocation(lat, lng) {
  const buf = 0.12; // ~13km bounding box
  const bbox = `${(lng-buf).toFixed(4)},${(lat-buf).toFixed(4)},${(lng+buf).toFixed(4)},${(lat+buf).toFixed(4)}`;
  try {
    for (let p = 1; p <= 3; p++) {
      const pg = await flickrFetch({ bbox, page: p });
      for (const ph of pg.photo) ingestPhoto(ph);
      if (p === 1) { buildHeatmap(); rescaleSlider(); renderClusters(); }
      else { scheduleHeatmap(); }
      if (p >= pg.pages) break;
    }
    scheduleRender();
  } catch(e) { console.warn("GPS prefetch:", e); }
}

let introTarget = null;
if ("geolocation" in navigator) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      introTarget = [pos.coords.latitude, pos.coords.longitude];
      prefetchForLocation(pos.coords.latitude, pos.coords.longitude);
    },
    () => {},
    { timeout: 3800, maximumAge: 60000, enableHighAccuracy: false }
  );
}

// t=4s: start 10s zoom; on moveend fade logo over 3s
setTimeout(() => {
  const target = introTarget || [65.0, 14.0];
  const zoom   = introTarget ? 13 : 5.5;
  map.flyTo(target, zoom, { duration: 10, easeLinearity: 0.04 });

  // When this specific flyTo ends, fade logo (3s)
  map.once("moveend", () => {
    const ls = document.getElementById("loading-screen");
    ls.classList.add("fade-out");
    setTimeout(() => {
      ls.style.display = "none";
      document.getElementById("loading-bg").style.display = "none";
      loadingHidden = true;
      hasPanned = false;
    }, 3000);
  });
}, 4000);

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadArea();
</script>

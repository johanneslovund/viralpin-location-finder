<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CinePin" />
  <meta name="theme-color" content="#080d1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>CinePin - Location Finder</title>
  <meta name="description" content="Explore the most photographed spots in Norway — an interactive heatmap of photo locations powered by Flickr." />
  <script>const CONFIG={FLICKR_API_KEY:"07ca70504930cb812e9a2247e408525c"};</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    :root {
      --bg: #080d1a; --panel: rgba(6,11,28,0.86);
      --border: #182040; --accent: #3a5ae8; --text: #c8ccdf;
      --muted: #3a4268; --pill-active-bg: #1a2e7a; --pill-active-border: #3354c4;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* ── Loading screen ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: #080d1a;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      transition: opacity 0.6s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 3px solid #1a2550;
      border-top-color: #3a5ae8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loading-text { font-size: 0.85rem; color: #5a6898; letter-spacing: 0.08em; }

    /* ── Map fills full viewport ── */
    .main { position: fixed; inset: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; z-index: 1; background: var(--bg); }

    /* ── Floating title ── */
    #map-title {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800; pointer-events: none;
      font-size: 0.95rem; font-weight: 700; color: #dde2f5;
      white-space: nowrap; letter-spacing: -0.01em;
      text-shadow: 0 1px 10px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.6);
    }
    #map-title span { color: #4d7fff; }
    .leaflet-tile-pane { filter: saturate(0.75) brightness(1.18) hue-rotate(170deg); }

    /* ── Location search bar ── */
    #loc-search-wrap {
      position: absolute;
      top: calc(44px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 850;
      width: min(340px, calc(100vw - 80px));
    }
    #loc-search {
      width: 100%; background: rgba(6,11,28,0.88); border: 1px solid #182040;
      color: #c8ccdf; border-radius: 22px; padding: 9px 16px;
      font-size: 0.82rem; outline: none; font-family: inherit;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      -webkit-appearance: none;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    #loc-search::placeholder { color: #3a4268; }
    #loc-search:focus { border-color: #2a4aaf; }
    #loc-results {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: rgba(6,11,28,0.95); border: 1px solid #182040; border-radius: 14px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      overflow: hidden; box-shadow: 0 6px 30px rgba(0,0,0,0.7);
    }
    #loc-results.open { display: block; }
    .loc-result-item {
      padding: 10px 16px; font-size: 0.78rem; color: #8898c8; cursor: pointer;
      border-bottom: 1px solid #101830;
    }
    .loc-result-item:last-child { border-bottom: none; }
    .loc-result-item:active { background: rgba(58,90,232,0.15); }
    .loc-result-name { color: #c0d0ff; font-weight: 600; }
    .loc-result-detail { font-size: 0.68rem; color: #4a5888; margin-top: 2px; }

    /* ── Bottom container: two stacked floating panels ── */
    #bottom-container {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 800;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: min(540px, calc(100vw - 16px));
      contain: layout style;
      will-change: transform;
    }

    /* ── Floating heatmap button ── */
    #heatmap-toggle-wrap {
      position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px;
      width: 100%;
    }
    #heat-btn {
      background: var(--panel); border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 20px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
      min-height: 34px; -webkit-user-select: none; user-select: none;
    }
    #heat-btn.active {
      background: linear-gradient(135deg, #2a4ee8, #1a8fff);
      border-color: #6b9fff; color: #fff; font-weight: 700;
      box-shadow: 0 0 22px rgba(80,160,255,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
      text-shadow: 0 1px 6px rgba(0,80,255,0.4);
    }
    #heat-btn:active { opacity: 0.75; }

    /* Main panel: slider + tags */
    #map-bottom {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden; width: 100%;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    }

    /* Popularity slider */
    #pop-section {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px 6px; border-bottom: 1px solid #101830;
    }
    .pop-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
    #engagement-slider {
      flex: 1; appearance: none; -webkit-appearance: none;
      height: 2px; background: #1a2550; border-radius: 2px; outline: none; cursor: pointer;
      transform: scaleX(-1); touch-action: none;
    }
    #engagement-slider::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff;
      cursor: grab; box-shadow: 0 0 10px rgba(58,90,232,0.4);
    }
    #engagement-slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid #8aadff; cursor: grab;
    }
    #slider-value { font-size: 0.67rem; color: #6878b0; font-weight: 600; white-space: nowrap; min-width: 56px; text-align: right; }
    .slider-adj {
      background: none; border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 6px; width: 26px; height: 26px; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0; line-height: 1; font-weight: 400;
      transition: background 0.1s, color 0.1s;
    }
    .slider-adj:active { background: #1a2e7a; color: #c0d0ff; border-color: #3354c4; }

    /* Search panel */
    #search-panel { display: none; padding: 9px 14px 7px; border-bottom: 1px solid #101830; flex-direction: column; gap: 6px; }
    #search-panel.open { display: flex; }
    .sp-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    #search-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .tag-query-row { display: flex; align-items: center; gap: 6px; }
    .tag-query {
      flex: 1; background: #0d1428; border: 1px solid #1a2448; color: #c0d0ff;
      border-radius: 8px; padding: 7px 10px; font-size: 0.8rem; outline: none;
      -webkit-appearance: none; min-height: 36px;
    }
    .tag-query::placeholder { color: #2a3460; }
    .tag-query:focus { border-color: #2a4aaf; }
    .rm-tag-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 4px; min-width: 28px; min-height: 28px; }
    .sp-footer { display: flex; gap: 8px; margin-top: 2px; }
    #add-tag-btn { background: none; border: 1px solid #1a2448; color: #4a5888; border-radius: 8px; padding: 6px 12px; font-size: 0.72rem; cursor: pointer; min-height: 34px; }
    #do-search-btn { background: #1a2e7a; border: 1px solid #2a4aaf; color: #a8bfff; border-radius: 8px; padding: 6px 16px; font-size: 0.72rem; cursor: pointer; font-weight: 600; margin-left: auto; min-height: 34px; }

    /* Tag row: scrollable pills + pinned Search */
    #tag-row {
      display: flex; align-items: stretch; min-height: 48px; overflow: hidden;
    }
    #tag-bar-wrap {
      flex: 1 1 0; min-width: 0; position: relative; overflow: hidden;
    }
    /* Symmetric fade masks */
    #tag-bar-wrap::before {
      content: ""; pointer-events: none;
      position: absolute; top: 0; left: 0; bottom: 0; width: 36px;
      background: linear-gradient(to left, transparent, rgba(6,11,28,0.92));
      z-index: 2;
    }
    #tag-bar-wrap::after {
      content: ""; pointer-events: none;
      position: absolute; top: 0; right: 0; bottom: 0; width: 36px;
      background: linear-gradient(to right, transparent, rgba(6,11,28,0.92));
      z-index: 2;
    }
    #tag-bar {
      display: flex; gap: 7px; align-items: center; flex-wrap: nowrap;
      padding: 7px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; width: 100%; height: 100%;
    }
    #tag-bar::-webkit-scrollbar { display: none; }
    .tag-pill {
      background: transparent; border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 13px; font-size: 0.76rem; cursor: pointer;
      font-weight: 500; white-space: nowrap; flex-shrink: 0;
      min-height: 34px; transition: background 0.12s, color 0.12s, border-color 0.12s;
      -webkit-user-select: none; user-select: none;
    }
    .tag-pill:active { opacity: 0.7; }
    .tag-pill.active { background: var(--pill-active-bg); border-color: var(--pill-active-border); color: #c0d0ff; font-weight: 600; }

    /* Search pill — always visible, pinned LEFT, never shrinks */
    #search-pill-wrap {
      flex: 0 0 auto; display: flex; align-items: center;
      padding: 7px 8px 7px 10px;
      border-right: 1px solid #182040;
    }
    #search-pill {
      display: flex; align-items: center; gap: 5px;
      border: 1px solid #1e2d50; border-radius: 20px; padding: 6px 12px;
      cursor: pointer; white-space: nowrap; min-height: 34px;
      -webkit-user-select: none; user-select: none;
    }
    #search-pill:active { opacity: 0.7; }
    #search-pill.active { border-color: var(--pill-active-border); background: #111e38; }
    .search-icon { font-size: 0.76rem; color: #5868a0; }
    .search-label { font-size: 0.76rem; color: #5868a0; font-weight: 500; }

    /* ── Nav panel ── */
    #nav-panel {
      display: none; position: absolute;
      top: calc(52px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%); z-index: 900;
      background: var(--panel); border: 1px solid #1a3080;
      border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 10px 14px; align-items: center; gap: 10px;
      min-width: 280px; max-width: calc(100vw - 24px);
    }
    #nav-panel.active { display: flex; }
    #nav-info { flex: 1; min-width: 0; }
    #nav-dest-name { font-size: 0.8rem; font-weight: 600; color: #c0d0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #nav-details { font-size: 0.7rem; color: #5a78c0; margin-top: 2px; }
    #nav-stop { background: none; border: 1px solid #2a3a6a; color: #8898c0; border-radius: 6px; padding: 5px 10px; font-size: 0.76rem; cursor: pointer; flex-shrink: 0; min-height: 32px; }

    /* ── My Locations button ── */
    #my-locations-btn {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      right: calc(10px + env(safe-area-inset-right, 0px));
      z-index: 810;
      background: var(--panel); border: 1px solid #1e2d50; color: #5868a0;
      border-radius: 20px; padding: 6px 14px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      min-height: 34px; -webkit-user-select: none; user-select: none;
      transition: background 0.12s, color 0.12s;
    }
    #my-locations-btn:active { opacity: 0.7; }

    /* ── My Locations modal ── */
    #my-locations-modal {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.92); flex-direction: column;
      padding: calc(60px + env(safe-area-inset-top, 0px)) 16px calc(30px + env(safe-area-inset-bottom, 0px));
    }
    #my-locations-modal.open { display: flex; }
    .ml-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .ml-title { font-size: 1rem; font-weight: 700; color: #dde2f5; }
    .ml-header-actions { display: flex; gap: 8px; }
    #ml-new-folder, #ml-close {
      background: rgba(10,20,60,0.6); border: 1px solid #1a2e7a; color: #7c9fff;
      border-radius: 8px; padding: 6px 12px; font-size: 0.76rem; cursor: pointer;
      font-family: inherit; min-height: 36px;
    }
    #ml-close { background: none; border-color: #2a3a6a; color: #8898c0; }
    #ml-folders { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }
    .ml-folder { background: rgba(6,11,28,0.7); border: 1px solid #182040; border-radius: 14px; overflow: hidden; }
    .ml-folder-header {
      padding: 10px 14px; font-size: 0.75rem; font-weight: 700; color: #6878b0;
      text-transform: uppercase; letter-spacing: 0.06em; background: rgba(20,30,70,0.4);
    }
    .ml-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; padding: 10px; }
    .ml-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; border-radius: 10px; padding: 6px;
      transition: background 0.1s;
    }
    .ml-item:active { background: rgba(58,90,232,0.15); }
    .ml-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #182040; }
    .ml-item-name { font-size: 0.62rem; color: #7888b0; text-align: center; line-height: 1.3; max-width: 84px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ml-empty { padding: 24px; text-align: center; color: #3a4268; font-size: 0.8rem; }

    /* ── Cluster markers ── */
    .cm { position: relative; cursor: pointer; }
    .cm .thumb {
      display: block; border-radius: 10px; object-fit: cover;
      border: 2.5px solid rgba(255,255,255,0.85);
      box-shadow: 0 3px 14px rgba(0,0,0,0.75);
    }
    .cm::after {
      content: ""; position: absolute; bottom: -9px; left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-top: 10px solid rgba(255,255,255,0.85);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.55));
    }
    .cm .badge {
      position: absolute; bottom: 5px; left: 5px;
      background: rgba(0,0,0,0.75); color: #fff;
      font-size: 0.62rem; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; line-height: 1.6; pointer-events: none;
    }
    .cm.single .thumb { border-radius: 50%; }

    /* ── Location labels ── */
    .loc-icon { overflow: visible !important; }
    .loc-label {
      display: inline-block; white-space: nowrap; pointer-events: none;
      transform: translate(-50%, -100%); margin-top: -10px;
      background: rgba(20,36,120,0.88); border: 1px solid #4d6fe8;
      color: #d8e4ff; font-size: 0.72rem; font-weight: 700;
      padding: 4px 10px 4px 8px; border-radius: 7px;
      box-shadow: 0 2px 14px rgba(58,90,232,0.35);
      letter-spacing: 0.02em;
      opacity: 0;
      animation: locFadeIn 0.45s ease forwards;
    }
    .loc-label.fading { opacity: 0 !important; transition: opacity 0.3s ease; }
    @keyframes locFadeIn { from { opacity:0; transform:translate(-50%,-120%); } to { opacity:1; transform:translate(-50%,-100%); } }
    .loc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7aadff; display: inline-block;
      margin-right: 5px; vertical-align: middle;
    }

    /* ── User location dot ── */
    .user-dot { position: relative; width: 18px; height: 18px; }
    .user-dot .dot {
      width: 13px; height: 13px; background: #4d9fff; border: 2.5px solid #fff; border-radius: 50%;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      box-shadow: 0 0 8px #4d9fff88; z-index: 2;
    }
    .user-dot .ring {
      width: 34px; height: 34px; background: #4d9fff28; border-radius: 50%;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: pulse 2.2s ease-out infinite; z-index: 1;
    }
    @keyframes pulse {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(2.0); opacity: 0; }
    }

    /* ── Lightbox weather ── */
    #lb-weather { margin: 6px 0 2px; text-align: left; }
    #lb-sun {
      display: flex; flex-direction: column; gap: 3px;
      font-size: 0.74rem; color: #8898c8; margin-bottom: 10px;
    }
    .lb-sun-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 6px; border-radius: 7px;
    }
    .lb-sun-row.golden { background: rgba(255,180,40,0.08); }
    .lb-sun-row.blue   { background: rgba(60,120,255,0.08); }
    .lb-sun-row .sr-label { color: #5a6898; }
    .lb-sun-row .sr-val   { color: #c0d0ff; font-weight: 600; font-variant-numeric: tabular-nums; }
    .lb-sun-divider { height: 1px; background: #1a2448; margin: 3px 0; }
    #lb-hourly-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; margin-bottom: 6px;
    }
    #lb-hourly-wrap::-webkit-scrollbar { display: none; }
    #lb-hourly {
      display: flex; gap: 4px; min-width: max-content; padding: 2px 0;
    }
    .lb-h-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 46px; padding: 5px 4px; border-radius: 10px;
      background: rgba(20,30,70,0.5); border: 1px solid #1a2448;
    }
    .lb-h-time { font-size: 0.58rem; color: #4a5888; }
    .lb-h-icon { font-size: 1.05rem; line-height: 1; }
    .lb-h-temp { font-size: 0.72rem; font-weight: 600; color: #b8ccff; }
    #lb-weekly { display: none; flex-direction: column; gap: 3px; margin-bottom: 4px; }
    #lb-weekly.open { display: flex; }
    .lb-d-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px; border-radius: 8px; background: rgba(20,30,70,0.4);
      cursor: pointer; transition: background 0.1s;
    }
    .lb-d-item:active { background: rgba(58,90,232,0.15); }
    .lb-d-item.expanded { background: rgba(20,30,80,0.6); }
    .lb-d-day { font-size: 0.68rem; color: #5a6898; min-width: 30px; }
    .lb-d-icon { font-size: 0.95rem; }
    .lb-d-range { font-size: 0.68rem; color: #8898c0; margin-left: auto; }
    .lb-d-hourly { display: none; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 4px 0 2px; }
    .lb-d-hourly::-webkit-scrollbar { display: none; }
    .lb-d-hourly.open { display: block; }
    .lb-d-hourly-inner { display: flex; gap: 4px; min-width: max-content; }
    #lb-forecast-toggle {
      background: none; border: 1px solid #1e2a50; color: #4a5888;
      border-radius: 8px; padding: 4px 10px; font-size: 0.65rem;
      cursor: pointer; font-family: inherit; margin-top: 2px;
    }
    #lb-forecast-toggle:active { opacity: 0.7; }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 9999; flex-direction: column;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 60px 20px calc(80px + env(safe-area-inset-bottom, 0px));
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    #lightbox.open { display: flex; }
    #lightbox-img-wrap {
      position: relative; align-self: center; margin-bottom: 14px;
      max-width: 92vw;
    }

    .leaflet-bar { background: transparent !important; border: none !important; box-shadow: none !important; }
    .leaflet-bar a:active { opacity: 0.7; }
    .leaflet-tooltip { background: rgba(8,13,26,0.9); border: 1px solid #1a2540; color: #a8b8e0; font-size: 0.72rem; border-radius: 6px; }

    .loader { display: inline-block; width: 10px; height: 10px; border: 2px solid #2a4aaf; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive tweaks */
    @media (max-width: 560px) {
      #bottom-container { max-width: calc(100vw - 16px); }
      #map-title { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<!-- My Locations modal -->

<script>
// ─── Map ──────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true, tap: true }).setView([65.0, 15.0], 5);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd", maxZoom: 20, detectRetina: true,
}).addTo(map);

// Labels overlay (crisp city labels)
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png", {
  subdomains: "abcd", maxZoom: 20, detectRetina: true, opacity: 1, zIndex: 2,
  pane: map.getPanes().overlayPane,
}).addTo(map);

// Navy tint overlay pane
const overlayPane = map.createPane("navyOverlay");
overlayPane.style.cssText = "z-index:250;pointer-events:none;background:rgba(8,22,80,0.20);";

// ─── State ────────────────────────────────────────────────────────────────────
let allPhotos    = [];
let photoById    = new Map();
let heatLayer    = null;
let clusterLayer = L.layerGroup();
map.createPane("labelPane").style.zIndex = "640";
let labelLayer   = L.layerGroup().addTo(map);
let routeLayer   = null;
let showHeat     = true;
let currentTag   = "nature,landscape";
let topN         = 30;
let userMovedSlider = false;
let lastUserPos  = null;
let currentLbPhoto = null;
let labelGen     = 0;

// Gallery state
let galleryPhotos = [];
let galleryIndex  = 0;

// Perf: debounce timers
let renderTimer = null, fetchTimer = null, heatTimer = null, labelTimer = null;
let heatLastRun = 0;
const fetchedKeys = new Set();
const geocodeCache = new Map();
const MIN_FETCH_ZOOM = 4;

// Full weather data storage for day-click hourly
let fullWeatherData = null;

// ─── Quality filter ───────────────────────────────────────────────────────────
const BAD_WORDS = new Set(["selfie","portrait","baby","wedding","graduation",
  "birthday","party","family","friends","screenshot","whatsapp","instagram","profile"]);

function isGoodPhoto(ph) {
  if (!ph.url_sq || parseInt(ph.accuracy) < 10) return false;
  const t = (ph.title || "").toLowerCase();
  for (const w of BAD_WORDS) if (t.includes(w)) return false;
  return true;
}

// ─── Cell size by zoom ────────────────────────────────────────────────────────
const CELL_SIZES = [8,6,4,3,2.5,2,1,0.5,0.25,0.12,0.06,0.028,0.014,0.006];
function cellSize(z) { return z < CELL_SIZES.length ? CELL_SIZES[z] : 0; }

// ─── Cluster builder ──────────────────────────────────────────────────────────
function buildClusters(photos, zoom) {
  const cell = cellSize(zoom);
  if (cell === 0) return photos.map(p => ({ photos:[p], lat:p.lat, lng:p.lng, best:p }));
  const grid = new Map();
  for (const p of photos) {
    const key = `${Math.floor(p.lat/cell)},${Math.floor(p.lng/cell)}`;
    let g = grid.get(key);
    if (!g) { g = []; grid.set(key, g); }
    g.push(p);
  }
  return Array.from(grid.values(), g => {
    let best = g[0], lat = 0, lng = 0;
    for (const p of g) { lat += p.lat; lng += p.lng; if (p.views > best.views) best = p; }
    return { photos:g, lat:lat/g.length, lng:lng/g.length, best };
  });
}

// ─── Render clusters (rAF-gated) ─────────────────────────────────────────────
let rafPending = false;
let lastRenderBoundsKey = "";
let lastRenderZoom = -1;

function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; renderClusters(); });
}

function renderClusters() {
  clusterLayer.clearLayers();
  if (!allPhotos.length) return;
  const bounds = map.getBounds(), zoom = map.getZoom();

  // Skip re-render if bounds and zoom haven't changed significantly
  const boundsKey = `${bounds.getSouth().toFixed(2)},${bounds.getNorth().toFixed(2)},${bounds.getWest().toFixed(2)},${bounds.getEast().toFixed(2)}`;
  if (boundsKey === lastRenderBoundsKey && zoom === lastRenderZoom) return;
  lastRenderBoundsKey = boundsKey;
  lastRenderZoom = zoom;

  const buf = Math.max(cellSize(zoom) * 1.5, 0.05);
  const S = bounds.getSouth()-buf, N = bounds.getNorth()+buf,
        W = bounds.getWest()-buf,  E = bounds.getEast()+buf;

  const inView = [];
  for (const p of allPhotos) {
    if (p.thumb && p.lat>=S && p.lat<=N && p.lng>=W && p.lng<=E) inView.push(p);
  }
  inView.sort((a,b) => b.views - a.views);
  const filtered = inView.slice(0, topN);

  for (const cl of buildClusters(filtered, zoom)) {
    const single = cl.photos.length === 1;
    const sz = single ? 44 : 56;
    const icon = L.divIcon({
      className: "",
      html: `<div class="cm${single?" single":""}"><img class="thumb" src="${cl.best.thumb}" width="${sz}" height="${sz}"/>${!single?`<span class="badge">${fmt(cl.photos.length)}</span>`:""}</div>`,
      iconSize: [sz,sz+10], iconAnchor: [sz/2,sz+10],
    });
    L.marker([cl.lat,cl.lng],{icon})
      .on("click",()=>{ if(cl.photos.length===1) openLightbox(cl.best); else map.flyTo([cl.lat,cl.lng],Math.min(zoom+2,16),{duration:0.5}); })
      .addTo(clusterLayer);
  }
}

function fmt(n) { return n>=1000?(n/1000).toFixed(1).replace(".0","")+"k":String(n); }

// ─── Heatmap ──────────────────────────────────────────────────────────────────
const HEAT_GRADIENT = {0:"#0000cc",0.3:"#0088ff",0.55:"#00ffcc",0.75:"#ffdd00",0.9:"#ff4400",1:"#ff0000"};

function dynamicHeatOpts() {
  const zoom = map.getZoom();
  const radius = Math.max(8, Math.min(40, Math.round(10 + (zoom - 4) * 2.2)));
  return { radius, blur: Math.round(radius * 0.65) };
}

function buildHeatmap() {
  const now = Date.now();
  if (now - heatLastRun < 300) {
    scheduleHeatmap(); return;
  }
  heatLastRun = now;

  if (!showHeat || !allPhotos.length) {
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    return;
  }

  const bounds = map.getBounds();
  const buf = 0.15;
  const visPhotos = allPhotos.filter(p =>
    p.lat >= bounds.getSouth() - buf && p.lat <= bounds.getNorth() + buf &&
    p.lng >= bounds.getWest()  - buf && p.lng <= bounds.getEast()  + buf
  );
  if (!visPhotos.length) return;

  let maxV = 1;
  for (const p of visPhotos) if (p.views > maxV) maxV = p.views;
  const logMax = Math.log10(maxV + 1);
  const pts = visPhotos.map(p => [p.lat, p.lng, 0.08 + 0.92 * (Math.log10(p.views+1) / logMax)]);

  const { radius, blur } = dynamicHeatOpts();
  if (heatLayer) {
    heatLayer.setLatLngs(pts);
    heatLayer.options.radius = radius;
    heatLayer.options.blur   = blur;
    heatLayer.redraw();
  } else {
    heatLayer = L.heatLayer(pts, {
      radius, blur, maxZoom:13, opacity:0.84, gradient:HEAT_GRADIENT,
    }).addTo(map);
  }
  clusterLayer.remove(); clusterLayer.addTo(map);
  scheduleLabels();
}

let _heatRaf = null;
map.on("zoom", () => {
  if (!heatLayer) return;
  if (_heatRaf) return;
  _heatRaf = requestAnimationFrame(() => { _heatRaf = null; if (heatLayer) heatLayer.redraw(); });
});

function scheduleHeatmap() {
  clearTimeout(heatTimer);
  heatTimer = setTimeout(buildHeatmap, 400);
}

// ─── Heatmap toggle ───────────────────────────────────────────────────────────
const heatBtn = document.getElementById("heat-btn");

heatBtn.addEventListener("click", () => {
  showHeat = !showHeat;
  heatBtn.classList.toggle("active", showHeat);
  buildHeatmap();
  if (!showHeat) labelLayer.clearLayers();
});

// ─── Top-5 location labels ────────────────────────────────────────────────────
function nominatimZoom(z) {
  if (z >= 16) return 18;
  if (z >= 13) return 16;
  if (z >= 10) return 13;
  if (z >=  7) return 11;
  return 8;
}

function extractName(d, mapZoom) {
  const a = d.address || {};
  if (mapZoom >= 15) {
    return d.name || a.amenity || a.tourism || a.natural ||
           a.historic || a.leisure || a.man_made ||
           a.building || a.road || a.neighbourhood || a.suburb || "";
  }
  if (mapZoom >= 12) {
    return d.name || a.tourism || a.natural || a.leisure ||
           a.neighbourhood || a.suburb || a.village || a.town || "";
  }
  if (mapZoom >= 8) {
    return a.village || a.town || a.city_district || a.city || d.name || "";
  }
  return a.county || a.state || a.country || d.name || "";
}

async function geocode(lat, lng, mapZoom) {
  const nmZoom = nominatimZoom(mapZoom);
  const key    = `${lat.toFixed(3)},${lng.toFixed(3)},${nmZoom}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=${nmZoom}&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const name = extractName(d, mapZoom);
    geocodeCache.set(key, name);
    return name;
  } catch { return ""; }
}

// Reverse geocode for lightbox title (city/town at zoom 13)
async function reverseGeocodeCity(lat, lng) {
  const key = `city:${lat.toFixed(3)},${lng.toFixed(3)}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=13&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const d = await r.json();
    const a = d.address || {};
    const name = a.village || a.town || a.city_district || a.city || a.county || d.name || "";
    geocodeCache.set(key, name);
    return name;
  } catch { return ""; }
}

function scheduleLabels() {
  clearTimeout(labelTimer);
  labelTimer = setTimeout(updateLocationLabels, 800);
}

async function fadeOutLabels() {
  const els = document.querySelectorAll(".loc-label");
  if (!els.length) { labelLayer.clearLayers(); return; }
  els.forEach(el => el.classList.add("fading"));
  await sleep(320);
  labelLayer.clearLayers();
}

async function updateLocationLabels() {
  if (!showHeat || allPhotos.length === 0) {
    await fadeOutLabels(); return;
  }
  const gen    = ++labelGen;
  const zoom   = map.getZoom();
  const bounds = map.getBounds();
  const buf    = 0.02;

  const inView = allPhotos.filter(p =>
    p.lat >= bounds.getSouth()-buf && p.lat <= bounds.getNorth()+buf &&
    p.lng >= bounds.getWest()-buf  && p.lng <= bounds.getEast()+buf
  );
  if (!inView.length) { await fadeOutLabels(); return; }

  const CELL = Math.max(cellSize(zoom) * 0.5, 0.01);
  const grid  = new Map();
  for (const p of inView) {
    const key = `${Math.round(p.lat/CELL)},${Math.round(p.lng/CELL)}`;
    let g = grid.get(key);
    if (!g) { g = {lat:0,lng:0,views:0,n:0}; grid.set(key,g); }
    g.lat += p.lat; g.lng += p.lng; g.views += p.views; g.n++;
  }
  const top5 = Array.from(grid.values())
    .sort((a,b) => b.views - a.views)
    .slice(0, 5)
    .map(g => ({ lat:g.lat/g.n, lng:g.lng/g.n }));

  await fadeOutLabels();
  if (gen !== labelGen) return;

  for (let i = 0; i < top5.length; i++) {
    if (gen !== labelGen) return;
    const {lat, lng} = top5[i];
    // Use requestIdleCallback for geocoding to avoid blocking UI
    const name = await new Promise(resolve => {
      const cb = () => geocode(lat, lng, zoom).then(resolve);
      if (typeof requestIdleCallback === "function") requestIdleCallback(cb);
      else setTimeout(cb, 0);
    });
    if (gen !== labelGen) return;
    if (!name) continue;

    const icon = L.divIcon({
      className: "loc-icon",
      html: `<div class="loc-label"><span class="loc-dot"></span>${escHtml(name)}</div>`,
      iconSize: [0,0], iconAnchor: [0,0],
    });
    L.marker([lat, lng], { icon, interactive:false, pane:"labelPane" })
      .addTo(labelLayer);

    if (i < top5.length - 1) await sleep(1100);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Slider: non-linear (0→50: all→30, 50→100: 30→1) ──────────────────────
const slider    = document.getElementById("engagement-slider");
const sliderLbl = document.getElementById("slider-value");

// Map slider position (0–100) to topN
function sliderPosToTopN(pos, maxN) {
  if (pos <= 50) {
    // 0 = all (maxN), 50 = 30
    const t = pos / 50; // 0→1
    return Math.round(maxN + t * (30 - maxN));
  } else {
    // 50 = 30, 100 = 1
    const t = (pos - 50) / 50; // 0→1
    return Math.round(30 + t * (1 - 30));
  }
}

// Map topN to slider position
function topNToSliderPos(n, maxN) {
  if (n >= maxN) return 0;
  if (n <= 1) return 100;
  if (n >= 30) {
    // between maxN and 30: pos 0→50
    return Math.round(50 * (maxN - n) / (maxN - 30));
  } else {
    // between 30 and 1: pos 50→100
    return Math.round(50 + 50 * (30 - n) / 29);
  }
}

function rescaleSlider() {
  const b = map.getBounds(), buf = 0.1;
  let n = 0;
  for (const p of allPhotos) {
    if (p.lat>=b.getSouth()-buf&&p.lat<=b.getNorth()+buf&&p.lng>=b.getWest()-buf&&p.lng<=b.getEast()+buf) n++;
  }
  const maxN = Math.max(n, 60);
  slider.dataset.maxN = maxN;
  if (!userMovedSlider) {
    topN = 30;
    slider.value = topNToSliderPos(30, maxN);
    sliderLbl.textContent = "Top 30";
  }
}

function applyTopNFromSlider(pos) {
  const maxN = parseInt(slider.dataset.maxN || "60");
  topN = Math.max(1, sliderPosToTopN(pos, maxN));
  sliderLbl.textContent = topN >= maxN ? "All" : `Top ${topN}`;
  userMovedSlider = true;
  lastRenderBoundsKey = ""; // force re-render
  clearTimeout(renderTimer);
  renderTimer = setTimeout(scheduleRender, 50);
}

function applyTopN(val) {
  const maxN = parseInt(slider.dataset.maxN || "60");
  topN = Math.max(1, Math.min(maxN, val));
  slider.value = topNToSliderPos(topN, maxN);
  sliderLbl.textContent = topN >= maxN ? "All" : `Top ${topN}`;
  userMovedSlider = true;
  lastRenderBoundsKey = "";
  clearTimeout(renderTimer);
  renderTimer = setTimeout(scheduleRender, 50);
}

function sliderStep() {
  if (topN <= 10) return 1;
  if (topN <= 30) return 1;
  if (topN <= 100) return 5;
  if (topN <= 300) return 10;
  return 25;
}

// ─── Flickr API ───────────────────────────────────────────────────────────────
async function flickrFetch(extra) {
  const p = new URLSearchParams({
    method:"flickr.photos.search", api_key:CONFIG.FLICKR_API_KEY,
    has_geo:1, extras:"geo,url_sq,url_m,url_l,owner_name,views,title,accuracy",
    sort:"interestingness-desc", per_page:250,
    format:"json", nojsoncallback:1, content_type:1, media:"photos",
    ...(currentTag ? {tags:currentTag,tag_mode:"any"} : {}),
    ...extra,
  });
  const r = await fetch(`https://www.flickr.com/services/rest/?${p}`);
  if (!r.ok) throw new Error("Flickr HTTP " + r.status);
  const d = await r.json();
  if (d.stat !== "ok") throw new Error(d.message || "Flickr error");
  return d.photos;
}

function ingestPhoto(ph) {
  if (photoById.has(ph.id) || !isGoodPhoto(ph)) return false;
  const lat = parseFloat(ph.latitude), lng = parseFloat(ph.longitude);
  if (!lat && !lng) return false;
  const obj = { id:ph.id, title:ph.title||"Untitled", lat, lng,
    thumb:ph.url_sq, medium:ph.url_m, large:ph.url_l,
    owner:ph.owner, views:parseInt(ph.views)||0,
    url:`https://www.flickr.com/photos/${ph.owner}/${ph.id}` };
  allPhotos.push(obj); photoById.set(ph.id, obj);
  return true;
}

// ─── Fetch a bounding box ─────────────────────────────────────────────────────
function boxKey(bounds) {
  return `${bounds.getSouth().toFixed(2)},${bounds.getNorth().toFixed(2)},${bounds.getWest().toFixed(2)},${bounds.getEast().toFixed(2)}|${currentTag}`;
}

async function fetchBox(bounds, pages=3) {
  if (map.getZoom() < MIN_FETCH_ZOOM) return;
  const key = boxKey(bounds);
  if (fetchedKeys.has(key)) return;
  fetchedKeys.add(key);

  const w=Math.max(bounds.getWest(),-180), e=Math.min(bounds.getEast(),180);
  const s=Math.max(bounds.getSouth(),-90), n=Math.min(bounds.getNorth(),90);
  if (s>=n || w>=e) return;
  const bbox=`${w.toFixed(4)},${s.toFixed(4)},${e.toFixed(4)},${n.toFixed(4)}`;

  let added = 0;
  try {
    for (let p=1; p<=pages; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) if (ingestPhoto(ph)) added++;
      if (p >= pg.pages) break;
    }
    if (added > 0) {
      scheduleHeatmap(); rescaleSlider(); scheduleRender();
      document.getElementById("count-badge") && (document.getElementById("count-badge").textContent = `${allPhotos.length} spots`);
    }
  } catch(e) { console.warn("fetchBox:", e.message); }
}

// Silently preload surrounding 5×5 grid
function preloadSurrounding() {
  if (map.getZoom() < MIN_FETCH_ZOOM + 2) return;
  const b = map.getBounds();
  const W = b.getEast()-b.getWest(), H = b.getNorth()-b.getSouth();
  for (let dx=-2; dx<=2; dx++) for (let dy=-2; dy<=2; dy++) {
    if (!dx && !dy) continue;
    const nb = L.latLngBounds(
      [b.getSouth()+dy*H, b.getWest()+dx*W],
      [b.getNorth()+dy*H, b.getEast()+dx*W]
    );
    fetchBox(nb, 2);
  }
}

// ─── Initial area load ────────────────────────────────────────────────────────
async function loadArea() {
  const status = document.getElementById("status");
  status.innerHTML = `<span class="loader"></span>Loading…`;
  clearAll(); clusterLayer.addTo(map);

  try {
    const b = map.getBounds();
    const bbox = `${Math.max(b.getWest(),-180).toFixed(4)},${Math.max(b.getSouth(),-90).toFixed(4)},${Math.min(b.getEast(),180).toFixed(4)},${Math.min(b.getNorth(),90).toFixed(4)}`;
    for (let p=1; p<=4; p++) {
      const pg = await flickrFetch({bbox, page:p});
      for (const ph of pg.photo) ingestPhoto(ph);
      if (p===1) {
        buildHeatmap(); rescaleSlider(); scheduleRender();
        hideLoadingScreen();
      } else {
        scheduleHeatmap();
      }
      status.textContent = `${allPhotos.length} spots`;
      if (p >= pg.pages) break;
    }
    rescaleSlider(); scheduleRender();
    status.textContent = "";
    preloadSurrounding();
  } catch(err) {
    hideLoadingScreen();
    status.textContent = `⚠ ${err.message}`;
  }
}

async function doLocSearch(q) {
  if (!q) { locResultsEl.classList.remove("open"); return; }
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`, {
      headers: { "Accept-Language": "en" }
    });
    const results = await r.json();
    if (!results.length) {
      locResultsEl.innerHTML = `<div class="loc-result-item"><span class="loc-result-name">No results</span></div>`;
      locResultsEl.classList.add("open");
      return;
    }
    locResultsEl.innerHTML = results.map((res, i) => {
      const parts = res.display_name.split(",");
      const name = parts[0].trim();
      const detail = parts.slice(1, 3).join(",").trim();
      return `<div class="loc-result-item" data-idx="${i}" data-lat="${res.lat}" data-lon="${res.lon}" data-bb='${JSON.stringify(res.boundingbox)}'>
        <div class="loc-result-name">${escHtml(name)}</div>
        <div class="loc-result-detail">${escHtml(detail)}</div>
      </div>`;
    }).join("");
    locResultsEl.classList.add("open");
    locResultsEl.querySelectorAll(".loc-result-item[data-lat]").forEach(el => {
      el.addEventListener("click", () => {
        const lat = parseFloat(el.dataset.lat);
        const lon = parseFloat(el.dataset.lon);
        const bb = JSON.parse(el.dataset.bb); // [south,north,west,east]
        locResultsEl.classList.remove("open");
        locSearchInput.value = el.querySelector(".loc-result-name").textContent;
        if (bb && bb.length === 4) {
          map.fitBounds([[parseFloat(bb[0]),parseFloat(bb[2])],[parseFloat(bb[1]),parseFloat(bb[3])]]);
        } else {
          map.flyTo([lat, lon], 10, {duration: 1.2});
        }
        setTimeout(() => loadArea(), 800);
      });
    });
  } catch(e) { console.warn("loc search:", e); }
}

const navPanel = document.getElementById("nav-panel");

function fmtDuration(secs) {
  const m = Math.round(secs / 60);
  return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}m`;
}

async function navigateTo(ph) {
  closeLightbox();
  document.getElementById("nav-dest-name").textContent = ph.title;
  document.getElementById("nav-details").textContent = lastUserPos ? "Calculating…" : "Location unavailable";
  navPanel.classList.add("active");
  if (!lastUserPos) return;

  const {lat:uLat,lng:uLng} = lastUserPos;
  const coord = `${uLng},${uLat};${ph.lng},${ph.lat}`;
  try {
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coord}?overview=full&geometries=geojson`);
    const d = await r.json();
    if (d.code !== "Ok") throw new Error();
    const route = d.routes[0];
    const coords = route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(coords,{color:"#4d7fff",weight:5,opacity:0.88}).addTo(map);
    map.fitBounds(routeLayer.getBounds(),{paddingTopLeft:[20,80],paddingBottomRight:[20,120]});
    const km = (route.distance/1000).toFixed(1);
    const carTime  = fmtDuration(route.duration);
    const walkSecs = (route.distance / 1000) / 5 * 3600;
    const footTime = fmtDuration(walkSecs);
    document.getElementById("nav-details").innerHTML =
      `${km} km<br>🚗 ${carTime}<br>🥾 ${footTime}`;
  } catch { document.getElementById("nav-details").textContent = "Route unavailable."; }
}

// ─── Weather helpers ──────────────────────────────────────────────────────────
const WX_ICON = c => {
  if (c === 0) return "☀️";
  if (c <= 3)  return "🌤";
  if (c <= 48) return "🌫";
  if (c <= 55) return "🌦";
  if (c <= 65) return "🌧";
  if (c <= 77) return "❄️";
  if (c <= 82) return "🌦";
  return "⛈";
};

function fmtTime(isoOrDate) {
  const d = isoOrDate instanceof Date ? isoOrDate : new Date(isoOrDate);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDay(iso) {
  return new Date(iso).toLocaleDateString([], { weekday: "short" });
}

function addMinutes(isoOrDate, mins) {
  const d = isoOrDate instanceof Date ? new Date(isoOrDate) : new Date(isoOrDate);
  d.setMinutes(d.getMinutes() + mins);
  return d;
}

// ─── Moon phase ───────────────────────────────────────────────────────────────
function moonPhase() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth()+1, day = now.getDate();
  let jd = 367*year - Math.floor(7*(year+Math.floor((month+9)/12))/4) + Math.floor(275*month/9) + day + 1721013.5;
  const cycle = (jd - 2451550.1) / 29.53058867;
  const phase = cycle - Math.floor(cycle);
  const pct = Math.round(phase <= 0.5 ? phase*200 : (1-phase)*200);
  const emojis = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘','🌑'];
  const emoji = emojis[Math.round(phase * 8) % 9];
  return { emoji, pct, phase };
}

// ─── Aurora fetch ─────────────────────────────────────────────────────────────
async function fetchAurora() {
  try {
    const r = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
    const d = await r.json();
    if (!d || !d.length) return null;
    const kp = d[d.length - 1].kp_index;
    let label;
    if (kp < 2)      label = "None expected";
    else if (kp < 4) label = "Weak possibility";
    else if (kp < 6) label = "Moderate (visible in Norway!)";
    else             label = "Strong aurora expected!";
    return { kp, label };
  } catch { return null; }
}

// ─── Weather loader ───────────────────────────────────────────────────────────
async function loadWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&hourly=temperature_2m,weather_code&daily=sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min` +
    `&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    fullWeatherData = d;

    // Sun times
    const riseDate = new Date(d.daily.sunrise[0]);
    const setDate  = new Date(d.daily.sunset[0]);

    const blueRiseStart = addMinutes(riseDate, -30);
    const blueRiseEnd   = riseDate;
    const goldenRiseStart = riseDate;
    const goldenRiseEnd   = addMinutes(riseDate, 60);
    const goldenSetStart  = addMinutes(setDate, -60);
    const goldenSetEnd    = setDate;
    const blueSetStart    = setDate;
    const blueSetEnd      = addMinutes(setDate, 30);

    const moon = moonPhase();

    // Aurora (async, non-blocking)
    const auroraPromise = fetchAurora();

    const sunHtml = `
      <div class="lb-sun-row"><span class="sr-label">🌅 Sunrise</span><span class="sr-val">${fmtTime(riseDate)}</span></div>
      <div class="lb-sun-row blue"><span class="sr-label">🌫 Blue Hour (dawn)</span><span class="sr-val">${fmtTime(blueRiseStart)} – ${fmtTime(blueRiseEnd)}</span></div>
      <div class="lb-sun-row golden"><span class="sr-label">🌄 Golden Hour (am)</span><span class="sr-val">${fmtTime(goldenRiseStart)} – ${fmtTime(goldenRiseEnd)}</span></div>
      <div class="lb-sun-divider"></div>
      <div class="lb-sun-row"><span class="sr-label">🌇 Sunset</span><span class="sr-val">${fmtTime(setDate)}</span></div>
      <div class="lb-sun-row golden"><span class="sr-label">🌄 Golden Hour (pm)</span><span class="sr-val">${fmtTime(goldenSetStart)} – ${fmtTime(goldenSetEnd)}</span></div>
      <div class="lb-sun-row blue"><span class="sr-label">🌫 Blue Hour (dusk)</span><span class="sr-val">${fmtTime(blueSetStart)} – ${fmtTime(blueSetEnd)}</span></div>
      <div class="lb-sun-divider"></div>
      <div class="lb-sun-row"><span class="sr-label">${moon.emoji} Moon</span><span class="sr-val">${moon.pct}% illuminated</span></div>
      <div class="lb-sun-row" id="lb-aurora-row"><span class="sr-label">🌌 Aurora</span><span class="sr-val" id="lb-aurora-val">Loading…</span></div>
    `;
    document.getElementById("lb-sun").innerHTML = sunHtml;

    // Fill aurora once it resolves
    auroraPromise.then(aurora => {
      const el = document.getElementById("lb-aurora-val");
      if (el) el.textContent = aurora ? aurora.label : "Unavailable";
    });

    // Next 24 h hourly
    const now = new Date();
    const nowH = now.getFullYear()*1e6 + (now.getMonth()+1)*1e4 + now.getDate()*100 + now.getHours();
    const items = [];
    for (let i = 0; i < d.hourly.time.length && items.length < 9; i++) {
      const t = new Date(d.hourly.time[i]);
      const tH = t.getFullYear()*1e6 + (t.getMonth()+1)*1e4 + t.getDate()*100 + t.getHours();
      if (tH < nowH || t.getHours() % 3 !== 0) continue;
      const label = items.length === 0 ? "Now" : t.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      items.push(`<div class="lb-h-item">
        <span class="lb-h-time">${label}</span>
        <span class="lb-h-icon">${WX_ICON(d.hourly.weather_code[i])}</span>
        <span class="lb-h-temp">${Math.round(d.hourly.temperature_2m[i])}°</span>
      </div>`);
    }
    document.getElementById("lb-hourly").innerHTML = items.join("");

    // Weekly forecast (clickable days show hourly)
    const weeklyEl = document.getElementById("lb-weekly");
    weeklyEl.innerHTML = d.daily.time.map((t, dayIdx) => {
      return `<div class="lb-d-item" data-day="${dayIdx}">
        <span class="lb-d-day">${dayIdx===0?"Today":fmtDay(t)}</span>
        <span class="lb-d-icon">${WX_ICON(d.daily.weather_code[dayIdx])}</span>
        <span class="lb-d-range">${Math.round(d.daily.temperature_2m_min[dayIdx])}° – ${Math.round(d.daily.temperature_2m_max[dayIdx])}°</span>
      </div>
      <div class="lb-d-hourly" id="lb-day-${dayIdx}">
        <div class="lb-d-hourly-inner">${buildDayHourly(d, t)}</div>
      </div>`;
    }).join("");

    weeklyEl.querySelectorAll(".lb-d-item").forEach(el => {
      el.addEventListener("click", () => {
        const dayIdx = el.dataset.day;
        const hourlyEl = document.getElementById(`lb-day-${dayIdx}`);
        const isOpen = hourlyEl.classList.toggle("open");
        el.classList.toggle("expanded", isOpen);
        // Close others
        weeklyEl.querySelectorAll(".lb-d-hourly.open").forEach(h => {
          if (h.id !== `lb-day-${dayIdx}`) { h.classList.remove("open"); }
        });
        weeklyEl.querySelectorAll(".lb-d-item.expanded").forEach(other => {
          if (other !== el) other.classList.remove("expanded");
        });
      });
    });
  } catch {
    document.getElementById("lb-sun").innerHTML = `<div class="lb-sun-row"><span class="sr-label">Weather unavailable</span></div>`;
  }
}

function buildDayHourly(d, dateStr) {
  const prefix = dateStr.substring(0, 10);
  const items = [];
  for (let i = 0; i < d.hourly.time.length; i++) {
    if (!d.hourly.time[i].startsWith(prefix)) continue;
    const t = new Date(d.hourly.time[i]);
    if (t.getHours() % 3 !== 0) continue;
    items.push(`<div class="lb-h-item">
      <span class="lb-h-time">${t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
      <span class="lb-h-icon">${WX_ICON(d.hourly.weather_code[i])}</span>
      <span class="lb-h-temp">${Math.round(d.hourly.temperature_2m[i])}°</span>
    </div>`);
  }
  return items.join("");
}

// ─── Save locations (localStorage) ───────────────────────────────────────────
function getSaved() {
  try { return JSON.parse(localStorage.getItem("cinepinSaved") || "[]"); } catch { return []; }
}
function setSaved(arr) { localStorage.setItem("cinepinSaved", JSON.stringify(arr)); }
function getFolders() {
  try { return JSON.parse(localStorage.getItem("cinepinFolders") || '[{"name":"Saved","ids":[]}]'); } catch { return [{"name":"Saved","ids":[]}]; }
}
function setFolders(arr) { localStorage.setItem("cinepinFolders", JSON.stringify(arr)); }

function isSaved(id) { return getSaved().some(s => s.id === id); }

function toggleSave(ph) {
  let saved = getSaved();
  if (saved.some(s => s.id === ph.id)) {
    saved = saved.filter(s => s.id !== ph.id);
    // Remove from all folders
    const folders = getFolders();
    folders.forEach(f => { f.ids = f.ids.filter(id => id !== ph.id); });
    setFolders(folders);
  } else {
    saved.push({ id: ph.id, title: ph.title, lat: ph.lat, lng: ph.lng, thumb: ph.thumb });
    // Add to default folder
    const folders = getFolders();
    if (!folders.length) folders.push({ name: "Saved", ids: [] });
    if (!folders[0].ids.includes(ph.id)) folders[0].ids.push(ph.id);
    setFolders(folders);
  }
  setSaved(saved);
  updateSaveBtn(ph.id);
}

function updateSaveBtn(id) {
  const btn = document.getElementById("lb-save");
  if (!btn) return;
  if (isSaved(id)) {
    btn.textContent = "★ Saved";
    btn.classList.add("saved");
  } else {
    btn.textContent = "⭐ Save Location";
    btn.classList.remove("saved");
  }
}

    return;
  }

  foldersEl.innerHTML = folders.map((folder, fi) => {
    const items = folder.ids.map(id => savedMap.get(id)).filter(Boolean);
    if (!items.length) return "";
    const itemsHtml = items.map(ph => `
      <div class="ml-item" data-id="${escHtml(ph.id)}">
        <img src="${escHtml(ph.thumb)}" alt="" loading="lazy" />
        <div class="ml-item-name">${escHtml(ph.title)}</div>
      </div>
    `).join("");
    return `<div class="ml-folder">
      <div class="ml-folder-header">${escHtml(folder.name)}</div>
      <div class="ml-grid">${itemsHtml}</div>
    </div>`;
  }).join("");

  foldersEl.querySelectorAll(".ml-item").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.id;
      const ph = savedMap.get(id);
      if (!ph) return;
      closeMyLocations();
      // Try to find in allPhotos for full object, else use saved data
      const full = photoById.get(id) || ph;
      openLightbox(full);
    });
  });
}

document.getElementById("my-locations-btn").addEventListener("click", openMyLocations);
document.getElementById("ml-close").addEventListener("click", closeMyLocations);
document.getElementById("ml-new-folder").addEventListener("click", () => {
  const name = prompt("Folder name:");
  if (!name || !name.trim()) return;
  const folders = getFolders();
  folders.push({ name: name.trim(), ids: [] });
  setFolders(folders);
  renderMyLocations();
});
document.getElementById("my-locations-modal").addEventListener("click", e => {
  if (e.target === document.getElementById("my-locations-modal")) closeMyLocations();
});

// ─── Lightbox ────────────────────────────────────────────────────────────────
function buildGallery(ph) {
  const DELTA = 0.05;
  galleryPhotos = allPhotos
    .filter(p => Math.abs(p.lat - ph.lat) <= DELTA && Math.abs(p.lng - ph.lng) <= DELTA)
    .sort((a, b) => b.views - a.views);
  galleryIndex = galleryPhotos.findIndex(p => p.id === ph.id);
  if (galleryIndex < 0) { galleryPhotos = [ph]; galleryIndex = 0; }
}

function updateGalleryUI() {
  const navEl   = document.getElementById("lb-gallery-nav");
  const countEl = document.getElementById("lb-gallery-count");
  if (galleryPhotos.length > 1) {
    navEl.classList.add("visible");
    countEl.classList.add("visible");
    countEl.textContent = `${galleryIndex + 1} / ${galleryPhotos.length}`;
  } else {
    navEl.classList.remove("visible");
    countEl.classList.remove("visible");
  }
}

function openLightbox(ph) {
  currentLbPhoto = ph;
  buildGallery(ph);
  document.getElementById("lightbox-img").src = ph.large||ph.medium||ph.thumb;
  document.getElementById("lightbox-title").textContent = ph.title;
  document.getElementById("lb-gmaps").href = `https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}`;
  document.getElementById("lb-apmaps").href = `https://maps.apple.com/?ll=${ph.lat},${ph.lng}&q=${encodeURIComponent(ph.title)}`;
  document.getElementById("lb-streetview").href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${ph.lat},${ph.lng}`;
  document.getElementById("lb-sun").innerHTML = `<div class="lb-sun-row"><span class="sr-label">Loading weather…</span></div>`;
  document.getElementById("lb-hourly").innerHTML = "";
  document.getElementById("lb-weekly").classList.remove("open");
  document.getElementById("lb-forecast-toggle").textContent = "Weekly forecast ↓";
  document.getElementById("lightbox").classList.add("open");
  updateSaveBtn(ph.id);
  updateGalleryUI();
  loadWeather(ph.lat, ph.lng);
  // Async title update with city name
  reverseGeocodeCity(ph.lat, ph.lng).then(city => {
    if (currentLbPhoto && currentLbPhoto.id === ph.id && city) {
      document.getElementById("lightbox-title").textContent = `${ph.title} — ${city}`;
    }
  });
}

function navigateGallery(dir) {
  const next = galleryIndex + dir;
  if (next < 0 || next >= galleryPhotos.length) return;
  galleryIndex = next;
  const ph = galleryPhotos[galleryIndex];
  currentLbPhoto = ph;
  document.getElementById("lightbox-img").src = ph.large||ph.medium||ph.thumb;
  document.getElementById("lightbox-title").textContent = ph.title;
  document.getElementById("lb-gmaps").href = `https://www.google.com/maps/search/?api=1&query=${ph.lat},${ph.lng}`;
  document.getElementById("lb-apmaps").href = `https://maps.apple.com/?ll=${ph.lat},${ph.lng}&q=${encodeURIComponent(ph.title)}`;
  document.getElementById("lb-streetview").href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${ph.lat},${ph.lng}`;
  updateSaveBtn(ph.id);
  updateGalleryUI();
  reverseGeocodeCity(ph.lat, ph.lng).then(city => {
    if (currentLbPhoto && currentLbPhoto.id === ph.id && city) {
      document.getElementById("lightbox-title").textContent = `${ph.title} — ${city}`;
    }
  });
}

document.getElementById("lb-prev").addEventListener("click", () => navigateGallery(-1));
document.getElementById("lb-next").addEventListener("click", () => navigateGallery(1));

// Swipe detection on lightbox image (left/right = gallery, up/down = close)
(function() {
  const lbImg = document.getElementById("lightbox-img");
  const lb = document.getElementById("lightbox");
  let sx = 0, sy = 0;
  lbImg.addEventListener("touchstart", e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
  }, { passive: true });
  lbImg.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      navigateGallery(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // Swipe up/down on lightbox to close
  let lbSy = 0;
  lb.addEventListener("touchstart", e => { lbSy = e.touches[0].clientY; }, { passive: true });
  lb.addEventListener("touchend", e => {
    const dy = e.changedTouches[0].clientY - lbSy;
    if (Math.abs(dy) > 60) closeLightbox();
  }, { passive: true });
})();

document.getElementById("lb-navigate").addEventListener("click",()=>{ if(currentLbPhoto) navigateTo(currentLbPhoto); });
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLightbox();
  if (document.getElementById("lightbox").classList.contains("open")) {
    if (e.key === "ArrowLeft") navigateGallery(-1);
    if (e.key === "ArrowRight") navigateGallery(1);
  }
});

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
  currentLbPhoto = null;
}

// ─── Live location ────────────────────────────────────────────────────────────
let locMarker=null, locCircle=null, hasPanned=false;
const locIcon=L.divIcon({className:"",html:`<div class="user-dot"><div class="ring"></div><div class="dot"></div></div>`,iconSize:[18,18],iconAnchor:[9,9]});
if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy}=pos.coords;
    lastUserPos={lat,lng};
    if (!hasPanned) { hasPanned=true; map.flyTo([lat,lng],9,{duration:2}); }
    if (!locMarker) {
      locMarker=L.marker([lat,lng],{icon:locIcon,zIndexOffset:2000}).addTo(map).bindTooltip("You are here",{direction:"top"});
      locCircle=L.circle([lat,lng],{radius:accuracy,color:"#4d9fff",fillColor:"#4d9fff",fillOpacity:0.07,weight:1,opacity:0.35}).addTo(map);
    } else { locMarker.setLatLng([lat,lng]); locCircle.setLatLng([lat,lng]).setRadius(accuracy); }
  },err=>console.warn("GPS:",err.message),{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ─── Block map interaction behind bottom UI ───────────────────────────────────
const bottomContainer = document.getElementById("bottom-container");
L.DomEvent.disableScrollPropagation(bottomContainer);
L.DomEvent.disableClickPropagation(bottomContainer);
bottomContainer.addEventListener("touchstart", e => e.stopPropagation(), { passive: true });
bottomContainer.addEventListener("touchmove",  e => e.stopPropagation(), { passive: true });

// Block loc search from map interactions
const locSearchWrap = document.getElementById("loc-search-wrap");
L.DomEvent.disableScrollPropagation(locSearchWrap);
L.DomEvent.disableClickPropagation(locSearchWrap);

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadArea();
</script>
